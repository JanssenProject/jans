name: Cedarling Testcases 

on:
  pull_request:
    branches:
      - main
    paths:
      - "jans-cedarling/**"
permissions:
  contents: read

jobs:
  rust_tests:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable
        components: clippy
    - name: Ensure clippy is installed
      run: rustup component add --toolchain stable clippy
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: jans-cedarling
    - name: Run Tests (without default features)
      working-directory: jans-cedarling/cedarling
      run: cargo test --locked --no-default-features
    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Run Tests
      working-directory: jans-cedarling
      # cedarling_pg is excluded here — it pulls pgrx-pg-sys, whose build script
      # requires `cargo pgrx init`. The dedicated postgres_extension_tests job
      # below covers it end-to-end.
      run: cargo test --locked --workspace --exclude cedarling_pg
    - name: Run Clippy on native target
      working-directory: jans-cedarling
      run: cargo +stable clippy --workspace --exclude cedarling_pg --all-targets -- -D warnings

  cargo_audit:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Run cargo-audit
      uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        working-directory: jans-cedarling
        # RUSTSEC-2023-0071: `rsa` Marvin timing sidechannel affects RSA decryption.
        # Cedarling only uses `jsonwebtoken` for signature verification; the
        # decryption path is not reachable. No upstream fix available.
        ignore: RUSTSEC-2023-0071

  cargo_deny:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Run cargo-deny
      uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17
      with:
        manifest-path: jans-cedarling/Cargo.toml

  custom_lints:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Install Rust Stable
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable
    - name: Install Rust Nightly
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
      with:
        toolchain: nightly-2025-09-18
        components: llvm-tools-preview, rustc-dev
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: jans-cedarling
    - uses: cargo-bins/cargo-binstall@dc19f1e48450eefe5a29b8da6c6b00a87d730b37 # v1.18.1
    - name: Install dylint
      run: |
        export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
        cargo binstall cargo-dylint --version 5.0.0 --locked --no-confirm
        cargo binstall dylint-link --version 5.0.0 --locked --no-confirm
        if ! which dylint-link > /dev/null 2>&1; then
          echo "dylint-link not found via binstall, falling back to cargo install"
          cargo install dylint-link --version 5.0.0 --locked
        fi
        echo "dylint-link location: $(which dylint-link)"
    - name: Run Tests
      working-directory: jans-cedarling/custom-lints
      run: |
        export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
        cargo +nightly-2025-09-18 test
    - name: Run custom lints on workspace
      working-directory: jans-cedarling
      run: |
        export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
        # Nightly pin for dylint: check dylint release notes for compatible nightly.
        # To upgrade: 1) Find the nightly used by the target dylint release
        # 2) Test locally: cargo +nightly-YYYY-MM-DD dylint --all --workspace --path custom-lints
        # 3) Update the pin below and in the toolchain install step above
        RUSTFLAGS="-Dwarnings" cargo +nightly-2025-09-18 dylint --all --path custom-lints

  rust_benchmarks:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: jans-cedarling
    - name: Run benchmarks
      working-directory: jans-cedarling
      run: cargo bench --workspace --exclude cedarling_pg
    - name: Run script to analyze benchmarks
      working-directory: jans-cedarling
      run: |
        set -o pipefail
        python3 scripts/check_benchmarks.py | tee rust_bench_output.txt
    - name: Append Rust benchmark summary
      working-directory: jans-cedarling
      run: |
        python3 scripts/parse_binding_benchmarks.py --format rust rust_bench_output.txt >> $GITHUB_STEP_SUMMARY

  wasm_tests:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install chromium
      run: sudo apt-get update && sudo apt-get install chromium-chromedriver

    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Install Rust Stable
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable
        components: clippy
        targets: wasm32-unknown-unknown
    - name: Ensure clippy is installed
      run: rustup component add --toolchain stable clippy

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: jans-cedarling

    - name: Install specific wasm-pack version (v0.13.1)
      run: |
        curl -L https://github.com/rustwasm/wasm-pack/releases/download/v0.14.0/wasm-pack-v0.14.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /usr/local/bin --strip-components=1
        wasm-pack --version

    - name: Run WASM tests using chrome
      working-directory: jans-cedarling/bindings/cedarling_wasm
      run: wasm-pack test --headless --chrome

    - name: Run WASM tests using firefox
      working-directory: jans-cedarling/bindings/cedarling_wasm
      run: |
        # Work around Snap Firefox confinement on ubuntu-latest:
        # Snap Firefox cannot access /tmp profiles, so redirect TMPDIR under $HOME
        export TMPDIR="${HOME}/tmp"
        mkdir -p "$TMPDIR"
        wasm-pack test --headless --firefox

    - name: Build WASM for Node.js (benchmarks)
      working-directory: jans-cedarling/bindings/cedarling_wasm
      run: wasm-pack build --target nodejs --release

    - name: Run WASM binding benchmarks
      working-directory: jans-cedarling/bindings/cedarling_wasm
      run: |
        node benchmarks/benchmark.mjs | tee bench_output.txt
        python3 ../../scripts/parse_binding_benchmarks.py --format wasm bench_output.txt >> $GITHUB_STEP_SUMMARY

    - name: Run Clippy on WASM target
      working-directory: jans-cedarling
      run: cargo +stable clippy -p cedarling_wasm --target wasm32-unknown-unknown -- -D warnings

  python_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip || echo "Failed to upgrade pip"
        python3 -m pip install tox
    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: "1.95.0"
    - name: Test with pytest
      working-directory: jans-cedarling/bindings/cedarling_python
      run: tox
    - name: Run Python binding benchmarks
      if: matrix.python-version == '3.11'
      working-directory: jans-cedarling/bindings/cedarling_python
      run: |
        tox -e benchmark | tee bench_output.txt
        python3 ../../scripts/parse_binding_benchmarks.py --format python bench_output.txt >> $GITHUB_STEP_SUMMARY

  golang_tests:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: jans-cedarling
    - name: Install Golang dependencies
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
          go-version: '1.24'
          cache-dependency-path: jans-cedarling/bindings/cedarling_go/go.sum
    - name: Build Rust artifacts
      working-directory: jans-cedarling/bindings/cedarling_go
      run: |
        cargo build -r --locked -p cedarling_go
        cp "../../target/release/libcedarling_go.so" "."
    - name: Install Go dependencies
      working-directory: jans-cedarling/bindings/cedarling_go
      run: go mod download && go mod tidy -v && git --no-pager diff --exit-code go.mod go.sum || (echo 'go.mod or go.sum changed; run go mod tidy and commit' && exit 1)
    - name: Run golang tests
      working-directory: jans-cedarling/bindings/cedarling_go
      run: |
        export LD_LIBRARY_PATH="$(pwd):${LD_LIBRARY_PATH}"
        go test .
    - name: Run Go binding benchmarks
      working-directory: jans-cedarling/bindings/cedarling_go
      run: |
        export LD_LIBRARY_PATH="$(pwd):${LD_LIBRARY_PATH}"
        go test -bench=. -benchmem -benchtime=5s -count=1 -run=^$ | tee bench_output.txt
        python3 ../../scripts/parse_binding_benchmarks.py --format go bench_output.txt >> $GITHUB_STEP_SUMMARY

  c_tests:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: jans-cedarling
    - name: Build Rust C library
      working-directory: jans-cedarling/bindings/cedarling_c
      run: |
        cargo build --release --locked -p cedarling_c
        test -f target/include/cedarling_c.h || (echo "header missing" && exit 1)
    - name: Build and run C tests
      working-directory: jans-cedarling/bindings/cedarling_c
      run: |
        export LD_LIBRARY_PATH="../../target/release:${LD_LIBRARY_PATH}"
        cd tests
        make
        ./test_cedarling
    - name: Run C binding benchmarks
      working-directory: jans-cedarling/bindings/cedarling_c
      run: |
        export LD_LIBRARY_PATH="../../target/release:${LD_LIBRARY_PATH}"
        cd benchmarks && make
        ./benchmark_cedarling | tee bench_output.txt
        python3 ../../../scripts/parse_binding_benchmarks.py --format c bench_output.txt >> $GITHUB_STEP_SUMMARY

  uniffi_benchmarks:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable
    - name: Set up Java
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
      with:
        distribution: temurin
        java-version: "17"
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: jans-cedarling
    - name: Build UniFFI Java artifacts
      working-directory: jans-cedarling/bindings/cedarling_uniffi
      run: make java
    - name: Run UniFFI Java benchmarks
      working-directory: jans-cedarling/bindings/cedarling_uniffi/javaApp
      run: |
        export LD_LIBRARY_PATH="${GITHUB_WORKSPACE}/target/release:${LD_LIBRARY_PATH}"
        mvn -q compile exec:java -Dexec.mainClass=org.example.Benchmark | tee bench_output.txt
        python3 "${GITHUB_WORKSPACE}/jans-cedarling/scripts/parse_binding_benchmarks.py" --format java bench_output.txt >> $GITHUB_STEP_SUMMARY

  postgres_extension_tests:
    # Exercises the cedarling_pg Postgres extension under pgrx-managed Postgres.
    # The workspace-level rust_tests job already runs the non-pgrx unit tests and
    # clippy; this job additionally:
    #   1. runs the #[pg_test] suite against a real Postgres backend (cargo pgrx test)
    #   2. regenerates sql/cedarling_pg--0.1.0.sql and fails if it drifts from the
    #      committed copy, so the packaged schema stays in sync with #[pg_extern]s.
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623
    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable
        components: clippy
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: jans-cedarling
    - name: Install Postgres build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential libreadline-dev zlib1g-dev flex bison libxml2-dev \
          libxslt-dev libssl-dev libxml2-utils xsltproc ccache pkg-config
    - name: Install cargo-pgrx
      run: cargo install --locked cargo-pgrx --version =0.18.0
    - name: Initialize pgrx (pg16)
      run: cargo pgrx init --pg16 download
    - name: Run cedarling_pg pgrx tests
      working-directory: jans-cedarling/cedarling_pg
      run: cargo pgrx test --features pg16
    - name: Regenerate extension SQL schema
      working-directory: jans-cedarling/cedarling_pg
      run: cargo pgrx schema --features pg16 -o sql/cedarling_pg--0.1.0.sql
    - name: Fail if committed SQL schema drifted
      working-directory: jans-cedarling/cedarling_pg
      run: |
        git --no-pager diff --exit-code sql/cedarling_pg--0.1.0.sql \
          || (echo "sql/cedarling_pg--0.1.0.sql is out of date; run 'cargo pgrx schema --features pg16 -o sql/cedarling_pg--0.1.0.sql' and commit the result." && exit 1)