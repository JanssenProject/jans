name: "Cedarling: publish to crates.io"

# Publishes http_utils (internal dep) then cedarling to crates.io.
#
# Two trigger paths:
#   workflow_dispatch — manual; dry_run defaults to true (validation-first).
#   workflow_call     — called by release-trigger.yml (versioned release) and
#                       build-nightly-build.yml (nightly incremental publish).
#
# Valid ref values:
#   nightly    — queries the sparse index to find the highest 0.0.X already
#                published, then publishes at 0.0.(X+1). Mirrors the npm
#                nightly increment used by cedarling_wasm.
#   vX.Y.Z     — versions were already bumped by version_bump.py; publishes
#                as-is from the tagged tree.
#
# Both crate publish steps are idempotent via a sparse index preflight.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Release tag (v1.2.3) or "nightly"'
        required: true
      dry_run:
        description: 'Package but do not upload (cargo publish --dry-run). Default true — set false to publish for real.'
        type: boolean
        default: true

  workflow_call:
    inputs:
      ref:
        description: 'Release tag (v1.2.3) or "nightly"'
        required: true
        type: string
      dry_run:
        description: 'Package but do not upload'
        required: false
        type: boolean
        default: false
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: publish-cedarling-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'JanssenProject/jans'
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - name: Validate ref
      env:
        REF: ${{ inputs.ref }}
      run: |
        # Accept "nightly", plain vX.Y.Z, or pre-release tags like v1.2.3-rc1.
        # Anchored at end ($) to reject trailing junk. Mirrors the version regex
        # in release-trigger.yml: ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$
        if ! echo "${REF}" | grep -qE '^(nightly|v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?)$'; then
          echo "ERROR: ref '${REF}' must be a release tag (vX.Y.Z, vX.Y.Z-rc1, …) or 'nightly'."
          exit 1
        fi

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        # Translate "nightly" to "main": the nightly tag is deleted and recreated by
        # build-nightly-build, so it is unreliable across jobs. main is the stable
        # source for all nightly builds.
        ref: ${{ inputs.ref == 'nightly' && 'main' || inputs.ref }}
        persist-credentials: false

    - name: Install Protoc
      uses: arduino/setup-protoc@3ea1d70ac22caff0b66ed6cb37d5b7aadebd4623

    - name: Install Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: jans-cedarling

    - name: Compute and patch nightly version
      if: ${{ inputs.ref == 'nightly' }}
      # Mirrors the npm nightly increment used by cedarling_wasm (build-packages.yml):
      # query the registry for the highest 0.0.X already published, publish at 0.0.(X+1).
      # Patches Cargo.toml files in-place; cargo publish uses --allow-dirty (no --locked)
      # because the working tree is intentionally modified.
      working-directory: jans-cedarling
      run: |
        # Find the highest 0.0.X patch already published for cedarling.
        # Fail fast on curl error so a network outage does not silently publish 0.0.1
        # as if no prior nightly versions exist.
        INDEX_RESPONSE=$(curl -sf --connect-timeout 10 --max-time 30 \
          -H "User-Agent: jans-cedarling-publish-workflow" \
          "https://index.crates.io/ce/da/cedarling") || {
          echo "ERROR: Failed to fetch cedarling from the sparse registry index."
          exit 1
        }
        LAST_PATCH=$(echo "${INDEX_RESPONSE}" \
          | grep -o '"vers":"0\.0\.[0-9]*"' \
          | sed 's/"vers":"0\.0\.\([0-9]*\)"/\1/' \
          | sort -n | tail -1)
        # Empty means no 0.0.X versions published yet; start the series at 0.0.1.
        LAST_PATCH="${LAST_PATCH:-0}"
        NIGHTLY_VERSION="0.0.$((LAST_PATCH + 1))"
        echo "Last published patch: 0.0.${LAST_PATCH} → publishing ${NIGHTLY_VERSION}"

        # Patch http_utils version
        sed -i "s/^version = \".*\"/version = \"${NIGHTLY_VERSION}\"/" http_utils/Cargo.toml
        # Patch workspace dep version constraint so cedarling's published manifest resolves correctly
        sed -i "s/http_utils = { path = \"http_utils\", version = \"[^\"]*\" }/http_utils = { path = \"http_utils\", version = \"${NIGHTLY_VERSION}\" }/" Cargo.toml
        # Patch cedarling version
        sed -i "s/^version = \".*\"/version = \"${NIGHTLY_VERSION}\"/" cedarling/Cargo.toml

        echo "NIGHTLY_VERSION=${NIGHTLY_VERSION}" >> $GITHUB_ENV

    - name: Dry-run package check (http_utils + cedarling)
      if: ${{ inputs.dry_run == true }}
      working-directory: jans-cedarling
      env:
        REF: ${{ inputs.ref }}
      run: |
        if [ "${REF}" = "nightly" ]; then
          cargo publish -p http_utils --allow-dirty --dry-run
          cargo publish -p cedarling --allow-dirty --dry-run
        else
          cargo publish -p http_utils --locked --dry-run
          cargo publish -p cedarling --locked --dry-run
        fi

    - name: Publish http_utils and wait for index
      if: ${{ inputs.dry_run != true }}
      # Idempotent: preflight the sparse index so a re-run skips an already-uploaded version.
      # Sparse index path for "http_utils" (len > 3): ht/tp/http_utils
      working-directory: jans-cedarling
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        REF: ${{ inputs.ref }}
      run: |
        HTTP_UTILS_VERSION=$(cargo metadata --no-deps --format-version 1 \
          | jq -r '.packages[] | select(.name == "http_utils") | .version')
        INDEX_URL="https://index.crates.io/ht/tp/http_utils"

        index_has_version() {
          curl -sf --connect-timeout 10 --max-time 30 \
            -H "User-Agent: jans-cedarling-publish-workflow" \
            "${INDEX_URL}" 2>/dev/null \
            | grep -q '"vers":"'"${HTTP_UTILS_VERSION}"'"'
        }

        if index_has_version; then
          echo "http_utils@${HTTP_UTILS_VERSION} already in registry index; skipping publish."
        else
          PUBLISH_FLAGS="--locked"
          [ "${REF}" = "nightly" ] && PUBLISH_FLAGS="--allow-dirty"
          cargo publish -p http_utils ${PUBLISH_FLAGS}

          echo "Waiting for http_utils@${HTTP_UTILS_VERSION} in the sparse registry index..."
          found=0
          for i in $(seq 1 20); do
            if index_has_version; then
              echo "http_utils@${HTTP_UTILS_VERSION} is visible in the registry index."
              found=1
              break
            fi
            echo "Not yet visible (attempt ${i}/20); retrying in 15s..."
            sleep 15
          done
          if [ "${found}" -eq 0 ]; then
            echo "ERROR: http_utils@${HTTP_UTILS_VERSION} did not appear in the registry index after 20 attempts."
            exit 1
          fi
        fi

    - name: Publish cedarling
      if: ${{ inputs.dry_run != true }}
      # Idempotent: preflight the sparse index so re-runs skip already-uploaded versions.
      # Mirrors the http_utils wait loop: polls until the version is visible before
      # exiting so a re-run does not race a just-uploaded but not-yet-indexed version.
      # Sparse index path for "cedarling" (len > 3): ce/da/cedarling
      working-directory: jans-cedarling
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        REF: ${{ inputs.ref }}
      run: |
        CEDARLING_VERSION=$(cargo metadata --no-deps --format-version 1 \
          | jq -r '.packages[] | select(.name == "cedarling") | .version')
        INDEX_URL="https://index.crates.io/ce/da/cedarling"

        index_has_version() {
          curl -sf --connect-timeout 10 --max-time 30 \
            -H "User-Agent: jans-cedarling-publish-workflow" \
            "${INDEX_URL}" 2>/dev/null \
            | grep -q '"vers":"'"${CEDARLING_VERSION}"'"'
        }

        if index_has_version; then
          echo "cedarling@${CEDARLING_VERSION} already in registry index; skipping publish."
        else
          PUBLISH_FLAGS="--locked"
          [ "${REF}" = "nightly" ] && PUBLISH_FLAGS="--allow-dirty"
          cargo publish -p cedarling ${PUBLISH_FLAGS}

          echo "Waiting for cedarling@${CEDARLING_VERSION} in the sparse registry index..."
          found=0
          for i in $(seq 1 20); do
            if index_has_version; then
              echo "cedarling@${CEDARLING_VERSION} is visible in the registry index."
              found=1
              break
            fi
            echo "Not yet visible (attempt ${i}/20); retrying in 15s..."
            sleep 15
          done
          if [ "${found}" -eq 0 ]; then
            echo "ERROR: cedarling@${CEDARLING_VERSION} did not appear in the registry index after 20 attempts."
            exit 1
          fi
        fi
