  test-production-environment-apply:
    name: Self-hosted OPA — Authorize Apply / production with environment (ALLOW)
    runs-on: ubuntu-latest
    needs: test-selfhosted-opa
    # Only run on post-merge pushes to main so the OIDC token carries
    # ref == refs/heads/main, which the Cedar policy requires.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # The `environment` key causes GitHub to inject an `environment` claim into
    # the OIDC token, which is the proof the ci-permit-apply-prod-via-environment
    # Cedar policy checks.  Without this, the token has no environment claim and
    # production Apply is denied (tested in the job above).
    #
    # IMPORTANT — required reviewers must be configured:
    # The "production" Environment in the JanssenProject/jans repository settings
    # must have at least one required reviewer.  GitHub only issues an environment-
    # scoped OIDC token (carrying `environment: "production"`) after a designated
    # reviewer explicitly approves the deployment in the Actions UI.  Without that
    # reviewer approval the job is blocked and the token is never issued, so the
    # Cedar policy gate cannot be bypassed by simply adding `environment: production`
    # to a workflow file.
    #
    # To configure required reviewers:
    #   Repository Settings → Environments → production → Required reviewers
    #   Add at least one GitHub user or team and save.
    environment: production

    permissions:
      id-token: write   # Required to request a GitHub OIDC token
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Start OPA (self-hosted, production mode)
        working-directory: jans-cedarling/cedarling_opa/demo/terraform-jwt
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

      - name: Wait for OPA to become healthy
        run: |
          echo "Waiting for OPA /health endpoint (up to 60 s)..."
          for i in $(seq 1 30); do
            if curl -sf --connect-timeout 5 --max-time 10 http://localhost:8181/health > /dev/null 2>&1; then
              echo "OPA is healthy after $((i * 2)) s."
              exit 0
            fi
            echo "attempt ${i}/30 — not ready, retrying in 2 s..."
            sleep 2
          done
          echo "ERROR: OPA did not become healthy within 60 s." >&2
          docker compose \
            -f jans-cedarling/cedarling_opa/demo/terraform-jwt/docker-compose.yml \
            -f jans-cedarling/cedarling_opa/demo/terraform-jwt/docker-compose.prod.yml \
            logs >&2 || true
          exit 1

      - name: Fetch GitHub OIDC token (environment-scoped)
        id: get-token
        run: |
          TOKEN=$(curl -sf --connect-timeout 5 --max-time 10 \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=cedarling-terraform" \
            | jq -r '.value')
          if [[ -z "${TOKEN}" || "${TOKEN}" == "null" ]]; then
            echo "ERROR: failed to obtain GitHub OIDC token." >&2
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: "Authorize Apply / production with environment — expect ALLOW (ci-permit-apply-prod-via-environment)"
        env:
          TF_JWT: ${{ steps.get-token.outputs.token }}
        run: |
          CURRENT_TIME=$(date +%s)

          PAYLOAD=$(jq -n \
            --arg jwt  "${TF_JWT}" \
            --argjson t "${CURRENT_TIME}" \
            '{
              input: {
                tokens: [{ mapping: "CI::GitHubWorkflow", payload: $jwt }],
                action: "CI::Action::\"Apply\"",
                resource: {
                  cedar_entity_mapping: {
                    entity_type: "CI::TerraformWorkspace",
                    id: "production"
                  }
                },
                context: { current_time: $t }
              }
            }')

          echo "Sending authorize request (Apply / production / environment-scoped token)..."
          RESPONSE=$(curl -sf --connect-timeout 5 --max-time 10 -X POST http://localhost:8181/v1/data/infra/terraform_jwt \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}") || {
            echo "ERROR: OPA authorize endpoint did not respond." >&2
            exit 1
          }

          echo "OPA response received."

          echo "${RESPONSE}" | jq -e '.result' > /dev/null || {
            echo "ERROR: OPA response is not valid JSON or is missing .result" >&2
            echo "Raw response: ${RESPONSE}" >&2
            exit 1
          }

          DECISION=$(echo "${RESPONSE}" | jq -r '.result.allow // false')
          echo "OPA decision: ${DECISION}"

          # This job runs inside the GitHub "production" Environment, so GitHub
          # injects `environment: "production"` into the OIDC token.  The
          # ci-permit-apply-prod-via-environment Cedar policy requires that claim.
          # An ALLOW here proves the full ALLOW path of the policy works end-to-end:
          # JWT validation, Cedar evaluation, and the environment gate check all
          # function correctly together.
          if [ "${DECISION}" != "true" ]; then
            echo "ERROR: Expected OPA to allow Apply to production (environment-scoped token)," >&2
            echo "       but the decision was '${DECISION}'." >&2
            echo "Full response:" >&2
            echo "${RESPONSE}" | jq . >&2
            exit 1
          fi

          echo "Confirmed: OPA returned ALLOW for Apply / production with environment — ci-permit-apply-prod-via-environment evaluated correctly."

      - name: Stop OPA
        if: always()
        working-directory: jans-cedarling/cedarling_opa/demo/terraform-jwt
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down --volumes || true
