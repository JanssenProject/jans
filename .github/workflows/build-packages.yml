name: Publish packages

on:
  # Chained after the publish workflow so the service WARs/jars exist on the
  # release before install.py downloads them. build-nightly-build recreates the
  # nightly tag -> "Janssen Build & Publish" publishes -> this runs.
  workflow_run:
    workflows: ["Janssen Build & Publish"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'The release tag to upload assets to (e.g., v1.0.1 or nightly). Required.'
        required: true
        type: string
      run_binary_packages:
        description: 'Run "publish_binary_packages" job?'
        required: true
        type: boolean
        default: false
      run_python_packages:
        description: 'Run "build_and_upload_python_packages" job?'
        required: true
        type: boolean
        default: false
      run_cedarling_wasm:
        description: 'Run "build_cedarling_wasm" job?'
        required: true
        type: boolean
        default: false
      run_demo_packages:
        description: 'Run "build_demo_packages" job? (Needs wasm)'
        required: true
        type: boolean
        default: false
      run_cedarling_python:
        description: 'Run "build_cedarling_python" job?'
        required: true
        type: boolean
        default: false
      run_cedarling_go:
        description: 'Run "build_cedarling_go" job?'
        required: true
        type: boolean
        default: false
      run_cedarling_krakend:
        description: 'Run "build_cedarling_krakend" job? (Needs go)'
        required: true
        type: boolean
        default: false
      run_cedarling_uniffi:
        description: 'Run "build_cedarling_uniffi" job?'
        required: true
        type: boolean
        default: false
      run_cedarling_pg:
        description: 'Run "build_cedarling_pg" job?'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish_binary_packages:
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_binary_packages))
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu24, ubuntu22, debian13, el9, el10, suse16]
        include:
          - name: ubuntu24
            os: ubuntu-22.04
            asset_suffix: ~ubuntu24.04_amd64.deb
            build_files: deb/noble
            asset_prefix: '_'
            asset_path: jans
            python_version: 3.11
          - name: ubuntu22
            os: ubuntu-22.04
            asset_suffix: ~ubuntu22.04_amd64.deb
            build_files: deb/jammy
            asset_prefix: '_'
            asset_path: jans
            python_version: '3.10'
          - name: debian13
            os: ubuntu-22.04
            asset_suffix: ~debian13_amd64.deb
            build_files: deb/trixie
            asset_prefix: '_'
            asset_path: jans
            python_version: 3.11
          - name: el9
            os: ubuntu-22.04
            asset_suffix: .el9.x86_64.rpm
            build_files: rpm/el9
            asset_prefix: '-'
            asset_path: jans/rpmbuild/RPMS/x86_64
            python_version: 3.11
          - name: el10
            os: ubuntu-22.04
            asset_suffix: .el10.x86_64.rpm
            build_files: rpm/el10
            asset_prefix: '-'
            asset_path: jans/rpmbuild/RPMS/x86_64
            python_version: 3.11
          - name: suse16
            os: ubuntu-24.04
            asset_suffix: .suse16.x86_64.rpm
            build_files: rpm/suse16
            asset_prefix: '-'
            asset_path: jans/rpmbuild/RPMS/x86_64
            python_version: 3.11

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.workflow_run.head_sha || inputs.target_tag || github.sha }}
        path: temp-jans

    - name: Getting build dependencies
      id: get_dependencies
      run: |
        mkdir -p jans/jans-src/opt/
        cp -rp temp-jans/automation/packaging/${{ matrix.build_files }}/* jans/
        cp temp-jans/jans-linux-setup/jans_setup/install.py jans/install.py
        sudo add-apt-repository -y ppa:deadsnakes/ppa
        sudo apt-get update
        sudo apt-get install -y python${{ matrix.python_version }} python${{ matrix.python_version }}-dev python${{ matrix.python_version }}-distutils
        sudo apt install -y build-essential devscripts debhelper rpm libpq-dev apache2 rsyslog postgresql postgresql-contrib
        sudo python${{ matrix.python_version }} -m ensurepip || sudo apt-get install -y python3-pip
        sudo PIP_BREAK_SYSTEM_PACKAGES=1 python${{ matrix.python_version }} -m pip install \
        --ignore-installed \
        cryptography urllib3 certifi requests ruamel.yaml pymysql psycopg2-binary
    - name: Get tag and version
      id: previoustag
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          TAG_NAME="${{ inputs.target_tag }}"
        else
          TAG_NAME=${{ github.event.workflow_run.head_branch }}
        fi

        echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
        if [[ "${TAG_NAME}" == "nightly" ]]; then
          echo "version=0.0.0-nightly" >> $GITHUB_OUTPUT
        else
          echo "version=$(echo "${TAG_NAME}" | sed 's/^v//')-stable" >> $GITHUB_OUTPUT
        fi
        echo "PACKAGE_PREFIX=jans" >> ${GITHUB_ENV}

    - name: Print Version and tag
      run: |
        echo "Version: ${{ steps.previoustag.outputs.version }}"
        echo "Tag: ${{ steps.previoustag.outputs.tag }}"
    - name: Running install and build
      id: run_build
      run: |
         cd jans/
         # install.py re-downloads the setup source from --setup-branch (default 'main' =
         # nightly) and bakes its app_info.json in, so a release package embeds the wrong
         # version unless we point it at the tag.
         sudo python${{ matrix.python_version }} install.py --setup-branch "${{ steps.previoustag.outputs.tag }}" -download-exit -yes --keep-downloads --keep-setup -force-download
         cp -r /opt/dist jans-src/opt/
         cp -r /opt/jans jans-src/opt/
         touch jans-src/opt/jans/jans-setup/package
         rm -rf install.py install jans-cli-tui
         rm -rf jans-src/opt/jans/jans-setup/logs/setup.log
         rm -rf jans-src/opt/jans/jans-setup/logs/setup_error.log
         sed -i "s/%VERSION%/${{ steps.previoustag.outputs.version }}/g" run-build.sh
         cat run-build.sh
         sudo ./run-build.sh

    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Sign package
      id: sign_package
      run: |
        OS="${{ matrix.name }}"
        VERSION="${{ steps.previoustag.outputs.version }}"
        SUFFIX="${{ matrix.asset_suffix }}"
        ARTIFACT="${{github.workspace}}/${{ matrix.asset_path }}/jans${{ matrix.asset_prefix }}${{ steps.previoustag.outputs.version }}${{ matrix.asset_suffix }}"
        cosign sign-blob --yes --bundle jans-${OS}-${VERSION}.bundle "${ARTIFACT}"

    - name: Create checksum
      id: create_checksum
      run: |
        cd jans/
        sed -i "s/%VERSION%/${{ steps.previoustag.outputs.version }}/g" checksum.sh
        sudo ./checksum.sh
        ls ${{github.workspace}}/${{ matrix.asset_path }}

    - name: Upload assets to release
      env:
        # Release-asset uploads run under a second account (RELEASE_UPLOAD_TOKEN) to spread the
        # REST rate limit off the release account; falls back to it when the secret is unset.
        GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
      run: |
        OS="${{ matrix.name }}"
        VERSION="${{ steps.previoustag.outputs.version }}"
        SUFFIX="${{ matrix.asset_suffix }}"
        
        gh release upload ${{ steps.previoustag.outputs.tag }} \
          "${{github.workspace}}/${{ matrix.asset_path }}/jans${{ matrix.asset_prefix }}${VERSION}${SUFFIX}" \
          "${{github.workspace}}/jans-${OS}-${VERSION}.bundle" \
          --repo ${{ github.repository }} \
          --clobber

    - name: Compute SHA256 digest for SLSA provenance
      id: compute_binary_digest
      run: |
        OS="${{ matrix.name }}"
        VERSION="${{ steps.previoustag.outputs.version }}"
        ARTIFACT="${{github.workspace}}/${{ matrix.asset_path }}/jans${{ matrix.asset_prefix }}${VERSION}${{ matrix.asset_suffix }}"
        FILENAME="jans${{ matrix.asset_prefix }}${VERSION}${{ matrix.asset_suffix }}"
        SHA256=$(sha256sum "${ARTIFACT}" | awk '{print $1}')
        echo "${SHA256}  ${FILENAME}" > "/tmp/binary-digest-${OS}.sha256"

    - name: Upload binary digest artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: binary-digest-${{ matrix.name }}
        path: /tmp/binary-digest-${{ matrix.name }}.sha256
        retention-days: 1

  build_and_upload_python_packages:
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_python_packages))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            os: ubuntu-22.04
            python_version: '3.10'
          - name: suse
            os: ubuntu-24.04
            python_version: '3.10'
            use_docker: true
            docker_image: opensuse/tumbleweed@sha256:46a7e0d003097de8b74079d5ed2bf6741329311a4a562f33677b252ea0eee228
          - name: macos
            os: macos-latest
            python_version: '3.10'

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.workflow_run.head_sha || inputs.target_tag || github.sha }}

    - name: Set up Python
      if: matrix.name != 'suse'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python_version }}

    - name: Build with Docker (SUSE)
      if: matrix.use_docker
      run: |
        docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace ${{ matrix.docker_image }} bash -c '
          zypper --gpg-auto-import-keys refresh
          zypper --non-interactive install -y gcc-c++ make gcc automake autoconf libtool openssl python311 python311-pip python311-setuptools python311-wheel python311-devel
          python3.11 -m pip install --break-system-packages shiv
          cd /workspace/jans-linux-setup
          python3.11 -m shiv --compressed -o jans-linux-setup.pyz -p "/usr/bin/env python3" -e jans_setup.jans_setup:main . --no-cache
          mv jans-linux-setup.pyz jans-linux-suse-X86-64-setup.pyz
          cd ../jans-cli-tui
          python3.11 -m shiv --compressed -o jans-cli-tui.pyz -p "/usr/bin/env python3" -e cli_tui.jans_cli_tui:run . --no-cache
          mv jans-cli-tui.pyz jans-cli-tui-linux-suse-X86-64.pyz
        '

    - name: Build with Ubuntu
      if: matrix.name == 'ubuntu'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 build-essential ca-certificates dbus systemd iproute2 gpg python3-pip python3-dev libpq-dev gcc
        python3 -m pip install --upgrade pip || echo "Failed to upgrade pip"
        pip3 install shiv wheel setuptools
        sudo chown -R runner:docker /home/runner/work/jans/jans        
        cd jans-linux-setup
        make zipapp || echo "Creating linux setup failed for ubuntu"
        mv jans-linux-setup.pyz jans-linux-ubuntu-X86-64-setup.pyz || echo "Failed"
        cd ../jans-cli-tui
        make zipapp 
        mv jans-cli-tui.pyz jans-cli-tui-linux-ubuntu-X86-64.pyz

    - name: Build with macOS
      if: matrix.name == 'macos'
      run: |
        python3 -m pip install --upgrade pip || echo "Failed to upgrade pip"
        pip3 install shiv wheel setuptools
        cd jans-linux-setup
        make zipapp || echo "Creating linux setup failed for macOS"
        mv jans-linux-setup.pyz jans-linux-macos-setup.pyz || echo "Failed"
        cd ../jans-cli-tui
        make zipapp 
        mv jans-cli-tui.pyz jans-cli-tui-macos.pyz

    - name: Get tag and version
      id: previoustag
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          TAG_NAME="${{ inputs.target_tag }}"
        else
          TAG_NAME=${{ github.event.workflow_run.head_branch }}
        fi

        echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
        if [[ "${TAG_NAME}" == "nightly" ]]; then
          echo "version=0.0.0-nightly" >> $GITHUB_OUTPUT
        else
          echo "version=$(echo "${TAG_NAME}" | sed 's/^v//')-stable" >> $GITHUB_OUTPUT
        fi
        echo "SETUP_PREFIX=jans-linux" >> ${GITHUB_ENV}
        echo "TUI_PREFIX=jans-cli-tui-linux" >> ${GITHUB_ENV}

    - name: Upload setup binaries to release
      continue-on-error: true
      uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
      with:
        repo_token: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
        file: ${{github.workspace}}/jans-linux-setup/jans-linux-${{ matrix.name }}-${{ matrix.name == 'macos' && 'setup' || 'X86-64-setup' }}.pyz
        asset_name: ${{ env.SETUP_PREFIX }}-${{ matrix.name }}-${{ matrix.name == 'macos' && 'setup' || 'X86-64-setup' }}.pyz
        tag: ${{ steps.previoustag.outputs.tag }}
        overwrite: true

    - name: Upload CLI binaries to release
      continue-on-error: true
      uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
      with:
        repo_token: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
        file: ${{github.workspace}}/jans-cli-tui/jans-cli-tui-${{ matrix.name == 'macos' && 'macos' || format('linux-{0}-X86-64', matrix.name) }}.pyz
        asset_name: ${{ env.TUI_PREFIX }}-${{ matrix.name == 'macos' && 'macos' || format('{0}-X86-64', matrix.name) }}.pyz
        tag: ${{ steps.previoustag.outputs.tag }}
        overwrite: true

    - name: Compute SHA256 digests for SLSA provenance
      id: compute_python_digest
      shell: bash
      run: |
        PLAT="${{ matrix.name }}"
        SETUP_FILE="${{github.workspace}}/jans-linux-setup/jans-linux-${{ matrix.name }}-${{ matrix.name == 'macos' && 'setup' || 'X86-64-setup' }}.pyz"
        TUI_FILE="${{github.workspace}}/jans-cli-tui/jans-cli-tui-${{ matrix.name == 'macos' && 'macos' || format('linux-{0}-X86-64', matrix.name) }}.pyz"
        sha256_of() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1" | awk '{print $1}'; else shasum -a 256 "$1" | awk '{print $1}'; fi; }
        DIGEST_FILE="/tmp/python-digest-${PLAT}.sha256"
        rm -f "${DIGEST_FILE}"
        for F in "${SETUP_FILE}" "${TUI_FILE}"; do
          if [ ! -f "${F}" ]; then
            echo "ERROR: expected artifact not found: ${F}" >&2
            exit 1
          fi
          SHA256=$(sha256_of "${F}")
          FNAME=$(basename "${F}")
          printf '%s  %s\n' "${SHA256}" "${FNAME}" >> "${DIGEST_FILE}"
        done
        touch "${DIGEST_FILE}"

    - name: Upload python digest artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: python-digest-${{ matrix.name }}
        path: /tmp/python-digest-${{ matrix.name }}.sha256
        retention-days: 1

  build_cedarling_wasm:
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_cedarling_wasm))
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.workflow_run.head_sha || inputs.target_tag || github.sha }}
    - name: Install Protoc
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'

    - name: Install latest stable Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable

    - name: Build WASM build
      id: sign-cedarling
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_wasm
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        rustup default stable
        rustup target add wasm32-unknown-unknown
        cargo install wasm-pack --locked
        echo "--- rustc version ---"
        rustc --version
        echo "--- cargo version ---"
        cargo --version
        echo "--- wasm-pack version ---"
        wasm-pack --version
        echo "---------------------"
  
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          TAG_NAME="${{ inputs.target_tag }}"
        else
          TAG_NAME=${{ github.event.workflow_run.head_branch }}
        fi
        
        TAG=$(echo "${TAG_NAME}" | sed 's/^v//')
        NPM_TAG=latest
        VERSION_TO_PUBLISH="${TAG}"
        
        if [ "${TAG}" == "nightly" ]; then
          NPM_TAG=nightly
          LAST_NIGHTLY_NPM_VERSION=$(npm dist-tag ls @janssenproject/cedarling_wasm | grep nightly | awk '{print $2}' | sort -V | tail -n 1) || echo "Failed to get last nightly version"
          VERSION_TO_PUBLISH=$(echo $LAST_NIGHTLY_NPM_VERSION | awk -F. '{print $1"."$2"."$3+1}')
        fi
        
        # Update Cargo.toml with the version to publish
        sed -i "s/^version = \".*\"/version = \"${VERSION_TO_PUBLISH}\"/" Cargo.toml
        echo "Set version to ${VERSION_TO_PUBLISH} in Cargo.toml"
  
        wasm-pack build --release --locked --target web --scope janssenproject
        cd pkg
        npm publish --provenance --access=public --tag "${NPM_TAG}" || {
          echo "npm publish failed (may already be published), continuing..."
          cat $(ls -t /home/runner/.npm/_logs/*-debug-0.log | head -n 1) || true
        }
        cd ..
  
        # Build for Node.js target with modified version
        NODEJS_VERSION="${VERSION_TO_PUBLISH}-nodejs"
        sed -i "s/^version = \".*\"/version = \"${NODEJS_VERSION}\"/" Cargo.toml
        echo "Set Node.js version to ${NODEJS_VERSION} in Cargo.toml"
        wasm-pack build --release --locked --target nodejs --scope janssenproject --out-dir pkg-nodejs
        cd pkg-nodejs
        npm publish --provenance --access=public --tag "${NPM_TAG}-nodejs" || {
          echo "npm publish (nodejs) failed (may already be published), continuing..."
          cat $(ls -t /home/runner/.npm/_logs/*-debug-0.log | head -n 1) || true
        }

    - name: Smoke-test WASM Node.js package
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_wasm
      run: |
        PKG_JS="pkg-nodejs/cedarling_wasm.js"
        if [ ! -f "${PKG_JS}" ]; then
          echo "::error::Smoke-test failed: ${PKG_JS} not found in pkg-nodejs/"
          echo "## WASM Node.js Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":x: **FAILED** — \`${PKG_JS}\` was not found" >> "${GITHUB_STEP_SUMMARY}"
          exit 1
        fi
        if node -e "require('./${PKG_JS}'); console.log('WASM Node.js package loaded OK')" 2>&1; then
          echo "## WASM Node.js Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":white_check_mark: \`${PKG_JS}\` loaded successfully via Node.js." >> "${GITHUB_STEP_SUMMARY}"
        else
          echo "::error::Smoke-test failed: node could not require ${PKG_JS}"
          echo "## WASM Node.js Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":x: **FAILED** — Node.js could not load \`${PKG_JS}\`" >> "${GITHUB_STEP_SUMMARY}"
          exit 1
        fi

    - name: Archive and sign pkg contents
      id: archive_pkg
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_wasm
      env:
        # Release-asset uploads run under a second account (RELEASE_UPLOAD_TOKEN) to spread the
        # REST rate limit off the release account; falls back to it when the secret is unset.
        GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ inputs.target_tag }}"
        else
          VERSION=${{ github.event.workflow_run.head_branch }}
        fi
        
        TAG=$(echo "${VERSION}" | sed 's/^v//')
        if [ "${TAG}" == "nightly" ]; then
          TAG="0.0.0"
        fi
        
        rm -rf pkg/.gitignore || echo "Failed to remove gitignore"
        tar -czvf cedarling_wasm_"${TAG}"_pkg.tar.gz -C pkg .
        cosign sign-blob --yes --bundle cedarling_wasm_"${TAG}"_pkg.tar.gz.bundle cedarling_wasm_"${TAG}"_pkg.tar.gz
        gh release upload "${VERSION}" *.tar.gz *.bundle --clobber || {
          echo "gh release upload failed (assets may already exist), continuing..."
        }

    - name: Compute SHA256 digest for SLSA provenance
      id: compute_wasm_digest
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_wasm
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ inputs.target_tag }}"
        else
          VERSION=${{ github.event.workflow_run.head_branch }}
        fi
        TAG=$(echo "${VERSION}" | sed 's/^v//')
        if [ "${TAG}" == "nightly" ]; then
          TAG="0.0.0"
        fi
        TARBALL="cedarling_wasm_${TAG}_pkg.tar.gz"
        SHA256=$(sha256sum "${TARBALL}" | awk '{print $1}')
        echo "${SHA256}  ${TARBALL}" > /tmp/wasm-digest.sha256

    - name: Upload WASM digest artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: wasm-digest
        path: /tmp/wasm-digest.sha256
        retention-days: 1

  build_demo_packages:
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_demo_packages))
    needs: build_cedarling_wasm
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.workflow_run.head_sha || inputs.target_tag || github.sha }}
    - name: Build with Ubuntu
      continue-on-error: true
      env:
        # Release-asset uploads run under a second account (RELEASE_UPLOAD_TOKEN) to spread the
        # REST rate limit off the release account; falls back to it when the secret is unset.
        GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
      run: |
        sudo apt-get update
        sudo apt-get install -y zip jq
        cd demos
        
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VER="${{ inputs.target_tag }}"
        else
          VER=${{ github.event.workflow_run.head_branch }}
        fi

        for i in $(ls -d */); do zip -r demo-${i%/}-$VER-source.zip $i; done
        sudo rm demo-janssen-tarp-$VER-source.zip || echo "No such file or directory"
        cd janssen-tarp/browser-extension
        
        TAG=$(echo "${VER}" | sed 's/^v//')
        VERSION_TO_SET="${TAG}"
        
        if [ "${TAG}" == "nightly" ]; then
          TAG="0.0.0"
          RANDOM_NUMBER=$((RANDOM % 9000 + 1000))
          VERSION_TO_SET="0.0.${RANDOM_NUMBER}"
        fi
        
        # Update version in all manifest and package files
        echo "Setting extension version to ${VERSION_TO_SET}"
        jq --arg version "${VERSION_TO_SET}" '.version = $version' src/static/firefox/manifest.json > temp.json && mv temp.json src/static/firefox/manifest.json
        jq --arg version "${VERSION_TO_SET}" '.version = $version' src/static/chrome/manifest.json > temp.json && mv temp.json src/static/chrome/manifest.json
        jq --arg version "${VERSION_TO_SET}" '.version = $version' package.json > temp.json && mv temp.json package.json
        
        wget https://github.com/${{ github.repository }}/releases/download/"${VER}"/cedarling_wasm_"${TAG}"_pkg.tar.gz -O cedarling_wasm.tar.gz
        mkdir -p wasm
        tar -xvf cedarling_wasm.tar.gz -C wasm
        rm cedarling_wasm.tar.gz
        ls wasm
        
        npm install --global web-ext
        npm install
        npm run build
        cd ./dist/firefox
        web-ext sign --channel=unlisted  --api-key="${{ secrets.MOZILLA_API_KEY }}" --api-secret="${{ secrets.MOZILLA_API_SECRET }}" || echo "Sign your extension for self-distribution to mozilla failed"
        cd ../..
        npm run pack
        mv ./release/janssen-tarp-chrome-*.zip ../demo-janssen-tarp-chrome-$VER.zip
        mv ./dist/firefox/web-ext-artifacts/*.xpi ../demo-janssen-tarp-firefox-$VER.xpi || touch ../demo-janssen-tarp-firefox-$VER.xpi
        cd ..

        gh release upload $VER *.zip --clobber
        gh release upload $VER *.xpi --clobber || echo "Sign your extension for self-distribution to mozilla failed"

    - name: Compute SHA256 digests for SLSA provenance
      id: compute_demo_digest
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VER="${{ inputs.target_tag }}"
        else
          VER=${{ github.event.workflow_run.head_branch }}
        fi
        DIGEST_FILE="/tmp/demo-digest.sha256"
        rm -f "${DIGEST_FILE}"
        for F in demos/demo-*-${VER}-source.zip demos/demo-janssen-tarp-chrome-${VER}.zip; do
          [ -f "${F}" ] || continue
          SHA256=$(sha256sum "${F}" | awk '{print $1}')
          FNAME=$(basename "${F}")
          echo "${SHA256}  ${FNAME}" >> "${DIGEST_FILE}"
        done
        touch "${DIGEST_FILE}"

    - name: Upload demo digest artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: demo-digest
        path: /tmp/demo-digest.sha256
        retention-days: 1

  build_cedarling_python:
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_cedarling_python))
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        name: [linux-x86_64, linux-aarch64, macos-x86_64, macos-arm64, windows]
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64
            manylinux: auto
          - name: linux-aarch64
            os: ubuntu-22.04-arm
            target: aarch64
            manylinux: auto
          - name: macos-x86_64
            os: macos-15
            target: x86_64-apple-darwin
            manylinux: 'off'
            skip_smoke_test: true
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            manylinux: 'off'
          - name: windows
            os: windows-2025
            target: x86_64-pc-windows-msvc
            manylinux: 'off'
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.workflow_run.head_sha || inputs.target_tag || github.sha }}

    - name: Install Protoc (macOS)
      if: runner.os == 'macOS'
      run: brew install protobuf

    - name: Install Protoc (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v26.1/protoc-26.1-win64.zip" -o /tmp/protoc.zip
        unzip -o /tmp/protoc.zip -d "C:/protoc"
        echo "PROTOC=C:\\protoc\\bin\\protoc.exe" >> $GITHUB_ENV
        echo "C:\\protoc\\bin" >> $GITHUB_PATH

    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Setup Python 3.10
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.10'

    - name: Setup Python 3.11
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.11'

    - name: Setup Python 3.12
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'

    - name: Resolve PyPI version
      id: resolve-version
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          TAG_NAME="${{ inputs.target_tag }}"
        else
          TAG_NAME=${{ github.event.workflow_run.head_branch }}
        fi

        TAG=$(echo "${TAG_NAME}" | sed 's/^v//')

        if [ "${TAG}" == "nightly" ]; then
          PYPI_JSON=$(curl -sf https://pypi.org/pypi/cedarling_python/json) || PYPI_JSON=""
          if [ -n "${PYPI_JSON}" ]; then
            LAST_VERSION=$(echo "${PYPI_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['info']['version'])")
          else
            LAST_VERSION="0.0.0"
          fi
          VERSION_TO_PUBLISH=$(echo "${LAST_VERSION}" | awk -F. '{print $1"."$2"."$3+1}')
        else
          VERSION_TO_PUBLISH="${TAG}"
        fi

        echo "version=${VERSION_TO_PUBLISH}" >> $GITHUB_OUTPUT
        echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "Resolved version: ${VERSION_TO_PUBLISH}"

        CARGO_TOML="${{ github.workspace }}/jans-cedarling/bindings/cedarling_python/Cargo.toml"
        CARGO_LOCK="${{ github.workspace }}/jans-cedarling/Cargo.lock"

        python3 -c 'import re,sys; p,v=sys.argv[1],sys.argv[2]; c=open(p,encoding="utf-8").read(); open(p,"w",encoding="utf-8").write(re.sub(r"^version = \".*\"","version = \""+v+"\"",c,flags=re.MULTILINE))' "${CARGO_TOML}" "${VERSION_TO_PUBLISH}"
        echo "Updated Cargo.toml to version ${VERSION_TO_PUBLISH}"

        python3 -c 'import re,sys; p,v=sys.argv[1],sys.argv[2]; c=open(p,encoding="utf-8").read(); c=re.sub("(name = \"cedarling_python\"\nversion = \")[^\"]*(\")",lambda m:m.group(1)+v+m.group(2),c); open(p,"w",encoding="utf-8").write(c)' "${CARGO_LOCK}" "${VERSION_TO_PUBLISH}"
        echo "Updated Cargo.lock to version ${VERSION_TO_PUBLISH}"

    - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
      with:
        working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_python
        command: build
        args: --release --locked -i python3.10 python3.11 python3.12
        target: ${{ matrix.target }}
        manylinux: ${{ matrix.manylinux }}
        before-script-linux: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then PROTOC_ARCH="linux-aarch_64"; else PROTOC_ARCH="linux-x86_64"; fi
          curl -fsSL "https://github.com/protocolbuffers/protobuf/releases/download/v26.1/protoc-26.1-${PROTOC_ARCH}.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc
        maturin-version: "1.9.4"

    - name: Smoke-test wheels
      if: '!matrix.skip_smoke_test'
      shell: bash
      run: |
        WHEELS_DIR="${{ github.workspace }}/jans-cedarling/target/wheels"
        cd "${WHEELS_DIR}"
        shopt -s nullglob
        WHLS=(*.whl)
        shopt -u nullglob
        if [ "${#WHLS[@]}" -eq 0 ]; then
          echo "::error::Smoke-test failed: no wheels found in target/wheels"
          echo "## Wheel Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":x: **FAILED** — no wheels found in \`target/wheels\`" >> "${GITHUB_STEP_SUMMARY}"
          exit 1
        fi
        FAILED=()
        for WHL in "${WHLS[@]}"; do
          echo "--- Smoke-testing: ${WHL} ---"
          PY_TAG=$(echo "${WHL}" | cut -d'-' -f3)
          MAJOR="${PY_TAG:2:1}"
          MINOR="${PY_TAG:3}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            py -${MAJOR}.${MINOR} -m pip install --force-reinstall "${WHL}" \
              && py -${MAJOR}.${MINOR} -c "import cedarling_python; print('ok:', cedarling_python)" \
              || FAILED+=("${WHL} (python${MAJOR}.${MINOR})")
          else
            python${MAJOR}.${MINOR} -m pip install --force-reinstall "${WHL}" \
              && python${MAJOR}.${MINOR} -c "import cedarling_python; print('ok:', cedarling_python)" \
              || FAILED+=("${WHL} (python${MAJOR}.${MINOR})")
          fi
        done
        if [ "${#FAILED[@]}" -gt 0 ]; then
          echo "## Wheel Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":x: **FAILED** — the following wheel(s) failed to import:" >> "${GITHUB_STEP_SUMMARY}"
          for ENTRY in "${FAILED[@]}"; do
            echo "::error::Smoke-test failed: wheel ${ENTRY} failed to import cedarling_python"
            echo "- \`${ENTRY}\`" >> "${GITHUB_STEP_SUMMARY}"
          done
          exit 1
        fi
        echo "## Wheel Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
        echo ":white_check_mark: All ${#WHLS[@]} wheel(s) passed import smoke-test." >> "${GITHUB_STEP_SUMMARY}"

    - name: Sign and upload Cedarling Python wheels
      id: sign-cedarling
      shell: bash
      env:
        # Release-asset uploads run under a second account (RELEASE_UPLOAD_TOKEN) to spread the
        # REST rate limit off the release account; falls back to it when the secret is unset.
        GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ inputs.target_tag }}"
        else
          VERSION=${{ github.event.workflow_run.head_branch }}
        fi

        TAG=$(echo "${VERSION}" | sed 's/^v//')
        if [ "${TAG}" == "nightly" ]; then
          TAG="${{ steps.resolve-version.outputs.version }}"
        fi

        cd "${GITHUB_WORKSPACE}/jans-cedarling/target/wheels"
        shopt -s nullglob
        WHLS=(*.whl)
        shopt -u nullglob
        if [ "${#WHLS[@]}" -eq 0 ]; then
          echo "No .whl files found in target/wheels"
          exit 1
        fi
        echo "Found ${#WHLS[@]} wheel(s): ${WHLS[*]}"
        for WHL in "${WHLS[@]}"; do
          BUNDLE="${GITHUB_WORKSPACE}/${WHL}.bundle"
          cosign sign-blob --yes --bundle "${BUNDLE}" "${WHL}"
          gh release upload "${VERSION}" "${WHL}" "${BUNDLE}" --clobber
        done

    - name: Publish Cedarling Python to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      continue-on-error: true
      with:
        packages-dir: ${{ github.workspace }}/jans-cedarling/target/wheels/
        skip-existing: true

    - name: Compute SHA256 digests for SLSA provenance
      id: compute_cedarling_python_digest
      shell: bash
      run: |
        sha256_of() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1" | awk '{print $1}'; else shasum -a 256 "$1" | awk '{print $1}'; fi; }
        PLAT="${{ matrix.name }}"
        WHEELS_DIR="${{ github.workspace }}/jans-cedarling/target/wheels"
        DIGEST_FILE="/tmp/cedarling-python-digest-${PLAT}.sha256"
        rm -f "${DIGEST_FILE}"
        shopt -s nullglob
        for WHL in "${WHEELS_DIR}"/*.whl; do
          SHA256=$(sha256_of "${WHL}")
          FNAME=$(basename "${WHL}")
          echo "${SHA256}  ${FNAME}" >> "${DIGEST_FILE}"
        done
        shopt -u nullglob
        touch "${DIGEST_FILE}"

    - name: Upload Cedarling Python digest artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: cedarling-python-digest-${{ matrix.name }}
        path: /tmp/cedarling-python-digest-${{ matrix.name }}.sha256
        retention-days: 1

  build_cedarling_go:
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_cedarling_go))
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        name: [ubuntu22, ubuntu22-arm, mac, windows]
        include:
          - name: ubuntu22
            os: ubuntu-22.04
          - name: ubuntu22-arm
            os: ubuntu-22.04-arm
          - name: mac
            os: macos-15
          - name: windows
            os: windows-2025
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.target_tag || github.sha }}
      - name: Install Protoc (Native)
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install protobuf
          elif [ "$RUNNER_OS" == "Windows" ]; then
            winget install --id=Google.Protobuf -e --accept-package-agreements --accept-source-agreements
            PROTOC_PATH=$(find /c/Users/runneradmin/AppData/Local/Microsoft/WinGet/Packages -name protoc.exe | head -n 1)
            if [ -z "$PROTOC_PATH" ]; then
              PROTOC_PATH="/c/Program Files/Protobuf/bin/protoc.exe"
            fi
            echo "PROTOC=$PROTOC_PATH" >> $GITHUB_ENV
            echo "$(dirname "$PROTOC_PATH")" >> $GITHUB_PATH
          fi
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Install Golang dependencies
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
            go-version: '1.24'

      - name: Install latest stable Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Build rust artifacts
        working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_go
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.target_tag }}"
          else
            VERSION=${{ github.event.workflow_run.head_branch }}
          fi
          TAG=$(echo "${VERSION}" | sed 's/^v//')
          if [ "${TAG}" == "nightly" ]; then
            TAG="0.0.0"
          fi
          
          cargo build -r --locked -p cedarling_go
          
          case "${{ matrix.name }}" in
            ubuntu22)
              cp ../../target/release/libcedarling_go.so libcedarling_go-${TAG}_x86-64.so
              ;;
            ubuntu22-arm)
              cp ../../target/release/libcedarling_go.so libcedarling_go-${TAG}_arm64.so
              ;;
            mac)
              cp ../../target/release/libcedarling_go.dylib libcedarling_go-${TAG}.dylib
              ;;
            windows)
              cp ../../target/release/cedarling_go.dll cedarling_go-${TAG}.dll
              cp ../../target/release/cedarling_go.dll.lib cedarling_go-${TAG}.lib
              ;;
          esac

      - name: Smoke-test shared library
        working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_go
        shell: bash
        run: |
          case "${{ matrix.name }}" in
            ubuntu22)      LIBFILE=$(ls libcedarling_go-*_x86-64.so 2>/dev/null | head -n 1) ;;
            ubuntu22-arm)  LIBFILE=$(ls libcedarling_go-*_arm64.so  2>/dev/null | head -n 1) ;;
            mac)           LIBFILE=$(ls libcedarling_go-*.dylib      2>/dev/null | head -n 1) ;;
            windows)       LIBFILE=$(ls cedarling_go-*.dll           2>/dev/null | head -n 1) ;;
          esac
          if [ -z "${LIBFILE}" ]; then
            echo "::error::Smoke-test failed: no shared library artifact found for ${{ matrix.name }}"
            echo "## Go Shared Library Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
            echo ":x: **FAILED** — no shared library artifact found" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
          echo "Found library: ${LIBFILE}"
          if python3 -c "import ctypes; ctypes.CDLL('./${LIBFILE}'); print('Library loaded OK')" 2>&1; then
            echo "## Go Shared Library Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
            echo ":white_check_mark: \`${LIBFILE}\` loaded successfully." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "::error::Smoke-test failed: could not load shared library ${LIBFILE}"
            echo "## Go Shared Library Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
            echo ":x: **FAILED** — \`${LIBFILE}\` could not be loaded" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

      - name: Sign and upload Cedarling Go libraries
        working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_go
        shell: bash
        env:
          # Release-asset uploads run under a second account (RELEASE_UPLOAD_TOKEN) to spread the
        # REST rate limit off the release account; falls back to it when the secret is unset.
        GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.target_tag }}"
          else
            VERSION=${{ github.event.workflow_run.head_branch }}
          fi
          TAG=$(echo "${VERSION}" | sed 's/^v//')
          if [ "${TAG}" == "nightly" ]; then
            TAG="0.0.0"
          fi
  
          FILE_LIB=""
          case "${{ matrix.name }}" in
            ubuntu22)
              FILE="libcedarling_go-${TAG}_x86-64.so"
              ;;
            ubuntu22-arm)
              FILE="libcedarling_go-${TAG}_arm64.so"
              ;;
            mac)
              FILE="libcedarling_go-${TAG}.dylib"
              ;;
            windows)
              FILE="cedarling_go-${TAG}.dll"
              FILE_LIB="cedarling_go-${TAG}.lib"
              ;;
          esac
  
          cosign sign-blob --yes --bundle "${FILE}.bundle" "$FILE"
          if [ -n "$FILE_LIB" ]; then
            cosign sign-blob --yes --bundle "${FILE_LIB}.bundle" "$FILE_LIB"
          fi
  
          gh release upload "${VERSION}" "${FILE}" "${FILE}.bundle" --clobber
          if [ -n "$FILE_LIB" ]; then
            gh release upload "${VERSION}" "${FILE_LIB}" "${FILE_LIB}.bundle" --clobber
          fi

      - name: Compute SHA256 digests for SLSA provenance
        id: compute_cedarling_go_digest
        working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_go
        shell: bash
        run: |
          sha256_of() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1" | awk '{print $1}'; else shasum -a 256 "$1" | awk '{print $1}'; fi; }
          PLAT="${{ matrix.name }}"
          DIGEST_FILE="/tmp/cedarling-go-digest-${PLAT}.sha256"
          rm -f "${DIGEST_FILE}"
          for F in libcedarling_go-*.so libcedarling_go-*.dylib cedarling_go-*.dll cedarling_go-*.lib; do
            [ -f "${F}" ] || continue
            SHA256=$(sha256_of "${F}")
            echo "${SHA256}  ${F}" >> "${DIGEST_FILE}"
          done
          touch "${DIGEST_FILE}"

      - name: Upload Cedarling Go digest artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cedarling-go-digest-${{ matrix.name }}
          path: /tmp/cedarling-go-digest-${{ matrix.name }}.sha256
          retention-days: 1

  build_cedarling_krakend:
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_cedarling_krakend))
    needs: build_cedarling_go
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    strategy:
      matrix:
        krakend-builder-image: [ 'builder:2.9.0', 'builder:2.9.0-linux-generic' ]
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.workflow_run.head_sha || inputs.target_tag || github.sha }}
    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
    - name: Set environment variables
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ inputs.target_tag }}"
        else
          VERSION=${{ github.event.workflow_run.head_branch }}
        fi
        TAG=$(echo "${VERSION}" | sed 's/^v//')
        if [ "${TAG}" == "nightly" ]; then
          TAG="0.0.0"
        fi
        
        echo TAG=${TAG} >> $GITHUB_ENV
        echo VERSION=${VERSION} >> $GITHUB_ENV
        KRAKEND_BUILDER_IMAGE_CLEAN=${{ matrix.krakend-builder-image }}
        KRAKEND_BUILDER_IMAGE_CLEAN=${KRAKEND_BUILDER_IMAGE_CLEAN/:/-}
        echo KRAKEND_BUILDER_IMAGE_CLEAN=${KRAKEND_BUILDER_IMAGE_CLEAN} >> $GITHUB_ENV
        echo CC="aarch64-linux-musl-gcc" >> $GITHUB_ENV
        echo ADD_GIT="apk add --no-cache git" >> $GITHUB_ENV
        if [ "${{ matrix.krakend-builder-image }}" == "builder:2.9.0-linux-generic" ]; then
          echo CC="aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo ADD_GIT="ls" >> $GITHUB_ENV # no-op
        fi
    - name: Build plugin for AMD64
      working-directory: ${{ github.workspace }}/jans-cedarling/cedarling-krakend
      run: |
        wget https://github.com/JanssenProject/jans/releases/download/${{ env.VERSION }}/libcedarling_go-${{ env.TAG }}_x86-64.so -O libcedarling_go.so
        docker run --rm -v "$PWD:/app" -w /app krakend/"${{ matrix.krakend-builder-image }}" sh -c "${{ env.ADD_GIT }} && go build -buildmode=plugin -o cedarling-krakend-amd64-${{ env.KRAKEND_BUILDER_IMAGE_CLEAN }}-${{ env.TAG }}.so ."
        rm libcedarling_go.so
    - name: Build plugin for ARM64
      working-directory: ${{ github.workspace }}/jans-cedarling/cedarling-krakend
      run: |
        wget https://github.com/JanssenProject/jans/releases/download/${{ env.VERSION }}/libcedarling_go-${{ env.TAG }}_arm64.so -O libcedarling_go.so
        docker run --rm -v "$PWD:/app" -w /app -e "CGO_ENABLED=1" -e "CC=${{ env.CC }}" -e "GOARCH=arm64" -e "GOHOSTARCH=amd64" krakend/"${{ matrix.krakend-builder-image }}" sh -c "${{ env.ADD_GIT }} && go build -ldflags='-extldflags=-fuse-ld=bfd -extld=${{ env.CC }}' -buildmode=plugin -o cedarling-krakend-arm64-${{ env.KRAKEND_BUILDER_IMAGE_CLEAN }}-${{ env.TAG }}.so ."
        rm libcedarling_go.so
    - name: Sign and upload Cedarling Krakend plugins
      working-directory: ${{ github.workspace }}/jans-cedarling/cedarling-krakend
      env:
        # Release-asset uploads run under a second account (RELEASE_UPLOAD_TOKEN) to spread the
        # REST rate limit off the release account; falls back to it when the secret is unset.
        GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
      run: |
        AMD64_SO="cedarling-krakend-amd64-${{ env.KRAKEND_BUILDER_IMAGE_CLEAN }}-${{ env.TAG }}.so"
        ARM64_SO="cedarling-krakend-arm64-${{ env.KRAKEND_BUILDER_IMAGE_CLEAN }}-${{ env.TAG }}.so"
        cosign sign-blob --yes --bundle "${AMD64_SO}.bundle" "${AMD64_SO}"
        cosign sign-blob --yes --bundle "${ARM64_SO}.bundle" "${ARM64_SO}"
        gh release upload "${{ env.VERSION }}" *.so *.bundle --clobber

    - name: Compute SHA256 digests for SLSA provenance
      id: compute_krakend_digest
      working-directory: ${{ github.workspace }}/jans-cedarling/cedarling-krakend
      run: |
        IMGCLEAN="${{ env.KRAKEND_BUILDER_IMAGE_CLEAN }}"
        DIGEST_FILE="/tmp/cedarling-krakend-digest-${IMGCLEAN}.sha256"
        rm -f "${DIGEST_FILE}"
        for F in cedarling-krakend-*-${IMGCLEAN}-*.so; do
          [ -f "${F}" ] || continue
          SHA256=$(sha256sum "${F}" | awk '{print $1}')
          echo "${SHA256}  ${F}" >> "${DIGEST_FILE}"
        done
        touch "${DIGEST_FILE}"

    - name: Upload KrakenD digest artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: cedarling-krakend-digest-${{ env.KRAKEND_BUILDER_IMAGE_CLEAN }}
        path: /tmp/cedarling-krakend-digest-${{ env.KRAKEND_BUILDER_IMAGE_CLEAN }}.sha256
        retention-days: 1

  build_cedarling_uniffi:
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_cedarling_uniffi))
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        ref: ${{ github.event.workflow_run.head_sha || inputs.target_tag || github.sha }}
    - name: Install Protoc
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Install latest stable Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
      with:
        toolchain: stable

    - name: Build and release cedarling uniffi build in linux
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_uniffi
      env:
        # Release-asset uploads run under a second account (RELEASE_UPLOAD_TOKEN) to spread the
        # REST rate limit off the release account; falls back to it when the secret is unset.
        GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
      run: |
        rustup default stable
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ inputs.target_tag }}"
        else
          VERSION=${{ github.event.workflow_run.head_branch }}
        fi
        TAG=$(echo "${VERSION}" | sed 's/^v//')
        if [ "${TAG}" == "nightly" ]; then
          TAG="0.0.0"
        fi
        
        cargo build -r --locked -p cedarling_uniffi
        cp ../../target/release/libcedarling_uniffi.so libcedarling_uniffi-${TAG}.so
        FILE="libcedarling_uniffi-${TAG}.so"
        cosign sign-blob --yes --bundle "${FILE}.bundle" "$FILE"
  
        gh release upload "${VERSION}" "$FILE" "${FILE}.bundle" --clobber
    - name: Smoke-test shared library
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_uniffi
      run: |
        shopt -s nullglob
        LIBS=(libcedarling_uniffi-*.so)
        shopt -u nullglob
        if [ "${#LIBS[@]}" -eq 0 ]; then
          echo "::error::Smoke-test failed: no libcedarling_uniffi-*.so found"
          echo "## UniFFI Shared Library Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":x: **FAILED** — no \`libcedarling_uniffi-*.so\` artifact found" >> "${GITHUB_STEP_SUMMARY}"
          exit 1
        fi
        LIBFILE="${LIBS[0]}"
        echo "Found library: ${LIBFILE}"
        if python3 -c "import ctypes; ctypes.CDLL('./${LIBFILE}'); print('Library loaded OK')" 2>&1; then
          echo "## UniFFI Shared Library Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":white_check_mark: \`${LIBFILE}\` loaded successfully." >> "${GITHUB_STEP_SUMMARY}"
        else
          echo "::error::Smoke-test failed: could not load shared library ${LIBFILE}"
          echo "## UniFFI Shared Library Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":x: **FAILED** — \`${LIBFILE}\` could not be loaded" >> "${GITHUB_STEP_SUMMARY}"
          exit 1
        fi

    - name: Build kotlin binding in linux
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_uniffi
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ inputs.target_tag }}"
        else
          VERSION=${{ github.event.workflow_run.head_branch }}
        fi
        TAG=$(echo "${VERSION}" | sed 's/^v//')
        if [ "${TAG}" == "nightly" ]; then
          TAG="0.0.0"
        fi
        
        cargo build -r --locked -p cedarling_uniffi
        cargo run --locked --bin uniffi-bindgen generate --library ${{ github.workspace }}/jans-cedarling/target/release/libcedarling_uniffi.so --language kotlin --out-dir ./
        zip -r cedarling_uniffi-kotlin-${TAG}.zip uniffi

    - name: Smoke-test Kotlin binding zip
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_uniffi
      run: |
        shopt -s nullglob
        ZIPS=(cedarling_uniffi-kotlin-*.zip)
        shopt -u nullglob
        if [ "${#ZIPS[@]}" -eq 0 ]; then
          echo "::error::Smoke-test failed: no cedarling_uniffi-kotlin-*.zip found"
          echo "## UniFFI Kotlin Binding Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":x: **FAILED** — no \`cedarling_uniffi-kotlin-*.zip\` artifact found" >> "${GITHUB_STEP_SUMMARY}"
          exit 1
        fi
        ZIPFILE="${ZIPS[0]}"
        echo "Found zip: ${ZIPFILE}"
        KT_COUNT=$(unzip -l "${ZIPFILE}" | grep -c '\.kt$' || true)
        if [ "${KT_COUNT}" -eq 0 ]; then
          echo "::error::Smoke-test failed: ${ZIPFILE} contains no .kt files"
          echo "## UniFFI Kotlin Binding Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":x: **FAILED** — \`${ZIPFILE}\` contains no \`.kt\` files" >> "${GITHUB_STEP_SUMMARY}"
          exit 1
        fi
        if ! unzip -l "${ZIPFILE}" | grep -q 'uniffi/'; then
          echo "::error::Smoke-test failed: ${ZIPFILE} does not contain a uniffi/ directory"
          echo "## UniFFI Kotlin Binding Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
          echo ":x: **FAILED** — \`${ZIPFILE}\` does not contain a \`uniffi/\` directory" >> "${GITHUB_STEP_SUMMARY}"
          exit 1
        fi
        echo "## UniFFI Kotlin Binding Smoke-Test Result" >> "${GITHUB_STEP_SUMMARY}"
        echo ":white_check_mark: \`${ZIPFILE}\` passed — contains \`uniffi/\` directory and ${KT_COUNT} \`.kt\` file(s)." >> "${GITHUB_STEP_SUMMARY}"

    - name: Sign and upload kotlin binding
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_uniffi
      env:
        # Release-asset uploads run under a second account (RELEASE_UPLOAD_TOKEN) to spread the
        # REST rate limit off the release account; falls back to it when the secret is unset.
        GH_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN || secrets.MOAUTO_WORKFLOW_TOKEN }}
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ inputs.target_tag }}"
        else
          VERSION=${{ github.event.workflow_run.head_branch }}
        fi
        TAG=$(echo "${VERSION}" | sed 's/^v//')
        if [ "${TAG}" == "nightly" ]; then
          TAG="0.0.0"
        fi
        FILE="cedarling_uniffi-kotlin-${TAG}.zip"
        cosign sign-blob --yes --bundle "${FILE}.bundle" "$FILE"

        gh release upload "${VERSION}" "$FILE" "${FILE}.bundle" --clobber

    - name: Compute SHA256 digests for SLSA provenance
      id: compute_uniffi_digest
      working-directory: ${{ github.workspace }}/jans-cedarling/bindings/cedarling_uniffi
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ inputs.target_tag }}"
        else
          VERSION=${{ github.event.workflow_run.head_branch }}
        fi
        TAG=$(echo "${VERSION}" | sed 's/^v//')
        if [ "${TAG}" == "nightly" ]; then
          TAG="0.0.0"
        fi
        DIGEST_FILE="/tmp/cedarling-uniffi-digest.sha256"
        rm -f "${DIGEST_FILE}"
        for F in libcedarling_uniffi-${TAG}.so cedarling_uniffi-kotlin-${TAG}.zip; do
          [ -f "${F}" ] || continue
          SHA256=$(sha256sum "${F}" | awk '{print $1}')
          echo "${SHA256}  ${F}" >> "${DIGEST_FILE}"
        done
        touch "${DIGEST_FILE}"

    - name: Upload UniFFI digest artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: cedarling-uniffi-digest
        path: /tmp/cedarling-uniffi-digest.sha256
        retention-days: 1

  collect-binary-digests:
    name: Collect binary package digests
    needs: [publish_binary_packages]
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_binary_packages))
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.merge.outputs.hashes }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.target_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          fi
      - name: Download binary digest artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          pattern: binary-digest-*
          merge-multiple: true
          path: /tmp/binary-digests
      - name: Merge and encode digests
        id: merge
        run: |
          MERGED=$(cat /tmp/binary-digests/*.sha256 | grep -v '^$' || true)
          echo "hashes=$(echo -n "${MERGED}" | base64 -w0)" >> $GITHUB_OUTPUT

  provenance-binary:
    name: SLSA provenance — binary packages
    needs: [collect-binary-digests]
    if: |
      github.repository == 'JanssenProject/jans' &&
      ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'nightly' || startsWith(github.event.workflow_run.head_branch, 'v'))) || (github.event_name == 'workflow_dispatch' && inputs.run_binary_packages)) &&
      needs.collect-binary-digests.outputs.hashes != ''
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: "${{ needs.collect-binary-digests.outputs.hashes }}"
      upload-assets: true
      upload-tag-name: "${{ needs.collect-binary-digests.outputs.tag }}"
      compile-generator: true
      provenance-name: binary.intoto.jsonl

