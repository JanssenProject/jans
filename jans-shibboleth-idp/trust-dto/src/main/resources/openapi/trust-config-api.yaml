openapi: 3.1.0

info:
  title: Trust Config API
  description: |
    API for creating and managing Shibboleth IDP trust relationships and their configuration.
    Each change to a trust relationship is a single, well-defined operation.
  version: 1.0.0
  license:
    name: Apache-2.0
    identifier: Apache-2.0

servers:
  - url: /v1/trust/config
    description: Base path for the trust configuration API.

security:
  - bearerAuth: []

tags:
  - name: trust-relationships
    description: Create, read and manage trust relationships.

paths:
  /trust-relationships:
    get:
      tags: [trust-relationships]
      operationId: listTrustRelationships
      summary: List trust relationships
      description: |
        Returns a page of trust relationships as summaries, optionally filtered. When several filters
        are given, all must match. Paging is 1-based. Filtering and paging are handled by the server.
      parameters:
        - name: nature
          in: query
          required: false
          description: Filter by nature (exact match).
          schema:
            $ref: '#/components/schemas/TrustNature'
        - name: status
          in: query
          required: false
          description: Filter by status (exact match).
          schema:
            $ref: '#/components/schemas/TrustStatus'
        - name: display_name
          in: query
          required: false
          description: Filter by display name (partial, case-insensitive).
          schema:
            type: string
        - name: description
          in: query
          required: false
          description: Filter by description (partial, case-insensitive).
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number, 1-based.
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: size
          in: query
          required: false
          description: Number of items per page.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of trust relationships.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [trust-relationships]
      operationId: createTrustRelationship
      summary: Create a trust relationship
      description: |
        Creates a new trust relationship in `DRAFT` status. Only the display name, description and
        nature are accepted; everything else (metadata source, profile configurations, released
        attributes, status and version) is set to default values by the server.

        The new trust relationship is assigned an `id`; use the `Location` header to fetch its
        full details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrustRelationshipRequest'
      responses:
        '201':
          description: Created. Body is a summary of the new trust relationship.
          headers:
            Location:
              description: URL of the created trust relationship.
              schema:
                type: string
                format: uri-reference
                examples:
                  - /v1/trust/config/trust-relationships/7f3a9c2e-4b1d-4c8a-9e2f-1a2b3c4d5e6f
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /trust-relationships/{id}:
    get:
      tags: [trust-relationships]
      operationId: getTrustRelationship
      summary: Get a trust relationship
      description: |
        Returns a trust relationship by id. The metadata source and each profile are shown by kind
        and status only; released attributes, activation diagnostics and discovered entity IDs are
        included in full. Fetch a metadata source or profile's complete settings from its own
        sub-resource.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      responses:
        '200':
          description: The requested trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [trust-relationships]
      operationId: updateTrustRelationshipBasicInfo
      summary: Update basic info
      description: |
        Updates a trust relationship's basic info — its display name and description — as a whole.
        The display name is required and must not be blank. The description is optional; omitting it
        (or sending null) clears it to empty. Allowed in any state.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBasicInfoRequest'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /trust-relationships/{id}/metadata-source:
    put:
      tags: [trust-relationships]
      operationId: setTrustRelationshipMetadataSource
      summary: Set the metadata source
      description: |
        Sets the metadata source of a trust relationship. The body shape is chosen by its `type`.
        Which types are allowed depends on the trust relationship's nature — `UPSTREAM` is for
        INDIVIDUAL and `MDQ` is for AGGREGATE — and an incompatible combination is rejected. Not
        allowed while the trust relationship is activating.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetadataSourceRequest'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/profiles/saml2-logout:
    patch:
      tags: [trust-relationships]
      operationId: updateSaml2LogoutProfileConfiguration
      summary: Update the SAML2 Logout profile
      description: |
        Partially updates the SAML2 Logout profile configuration. Only the fields present in the body
        are changed; omitted fields keep their current values. Not allowed while the trust
        relationship is activating.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Saml2LogoutProfileConfigurationRequest'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/profiles/saml2-artifact-resolution:
    patch:
      tags: [trust-relationships]
      operationId: updateSaml2ArtifactResolutionProfileConfiguration
      summary: Update the SAML2 Artifact Resolution profile
      description: |
        Partially updates the SAML2 Artifact Resolution profile configuration. Only the fields present
        in the body are changed; omitted fields keep their current values. Not allowed while the trust
        relationship is activating.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Saml2ArtifactResolutionProfileConfigurationRequest'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/profiles/saml2-attribute-query:
    patch:
      tags: [trust-relationships]
      operationId: updateSaml2AttributeQueryProfileConfiguration
      summary: Update the SAML2 Attribute Query profile
      description: |
        Partially updates the SAML2 Attribute Query profile configuration. Only the fields present in
        the body are changed; omitted fields keep their current values. Not allowed while the trust
        relationship is activating.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Saml2AttributeQueryProfileConfigurationRequest'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/profiles/shibboleth-sso:
    patch:
      tags: [trust-relationships]
      operationId: updateShibbolethSsoProfileConfiguration
      summary: Update the Shibboleth SSO profile
      description: |
        Partially updates the Shibboleth SSO profile configuration. Only the fields present in the
        body are changed; omitted fields keep their current values. Not allowed while the trust
        relationship is activating.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShibbolethSsoProfileConfigurationRequest'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/profiles/saml2-ecp:
    patch:
      tags: [trust-relationships]
      operationId: updateSaml2EcpProfileConfiguration
      summary: Update the SAML2 ECP profile
      description: |
        Partially updates the SAML2 ECP profile configuration. Only the fields present in the body are
        changed; omitted fields keep their current values. Not allowed while the trust relationship is
        activating.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Saml2EcpProfileConfigurationRequest'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/profiles/saml2-sso:
    patch:
      tags: [trust-relationships]
      operationId: updateSaml2SsoProfileConfiguration
      summary: Update the SAML2 SSO profile
      description: |
        Partially updates the SAML2 SSO profile configuration (the fullest profile). Only the fields
        present in the body are changed; omitted fields keep their current values. Not allowed while
        the trust relationship is activating.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Saml2SsoProfileConfigurationRequest'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/released-attributes:
    put:
      tags: [trust-relationships]
      operationId: setTrustRelationshipReleasedAttributes
      summary: Set the released attributes
      description: |
        Replaces the set of attributes the trust relationship releases with the ones provided. An
        empty array clears them all. Not allowed while the trust relationship is activating.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReleasedAttributesRequest'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/actions/activate:
    post:
      tags: [trust-relationships]
      operationId: activateTrustRelationship
      summary: Activate the trust relationship
      description: |
        Starts activation. Allowed from READY (moves to ACTIVATING) or INACTIVE (re-evaluates
        readiness). Returns 409 when the current state does not allow it. Takes no request body.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/actions/cancel-activation:
    post:
      tags: [trust-relationships]
      operationId: cancelTrustRelationshipActivation
      summary: Cancel a pending activation
      description: |
        Aborts a pending activation, returning the trust relationship to READY. Allowed only from
        ACTIVATING; returns 409 otherwise. Takes no request body.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /trust-relationships/{id}/actions/deactivate:
    post:
      tags: [trust-relationships]
      operationId: deactivateTrustRelationship
      summary: Deactivate the trust relationship
      description: |
        Deactivates an active trust relationship, moving it to INACTIVE. Allowed only from ACTIVE;
        returns 409 otherwise. Takes no request body.
      parameters:
        - $ref: '#/components/parameters/TrustRelationshipId'
      responses:
        '200':
          description: The updated trust relationship.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustRelationshipSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:

  parameters:
    TrustRelationshipId:
      name: id
      in: path
      required: true
      description: Identifier of the trust relationship.
      schema:
        type: string
        format: uuid

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token obtained out-of-band (bearer).

  schemas:

    CreateTrustRelationshipRequest:
      type: object
      description: Fields accepted when creating a trust relationship.
      additionalProperties: false
      required: [display_name, nature]
      properties:
        display_name:
          type: string
          minLength: 1
          description: |
            Human-readable name. Trimmed server-side and must be non-blank; a blank or
            whitespace-only value is rejected with `required_value_missing`.
          examples: [University Portal SP]
        description:
          type: string
          default: ""
          description: Optional free-text description. Omitted or null is stored as an empty string.
          examples: [SAML SP for the university student portal]
        nature:
          $ref: '#/components/schemas/TrustNature'

    UpdateBasicInfoRequest:
      type: object
      description: New basic info for a trust relationship; replaces the display name and description together.
      additionalProperties: false
      required: [display_name]
      properties:
        display_name:
          type: string
          minLength: 1
          description: Human-readable name. Trimmed server-side; must be non-blank.
          examples: [University Portal SP]
        description:
          type: string
          default: ""
          description: Optional free-text. Omitting it or sending null clears it to empty.
          examples: [SAML SP for the university student portal]

    MetadataSourceRequest:
      description: Where a trust relationship's metadata comes from. The concrete shape is selected by `type`.
      oneOf:
        - $ref: '#/components/schemas/NoneMetadataSourceRequest'
        - $ref: '#/components/schemas/FileMetadataSourceRequest'
        - $ref: '#/components/schemas/UriMetadataSourceRequest'
        - $ref: '#/components/schemas/UpstreamMetadataSourceRequest'
        - $ref: '#/components/schemas/MdqMetadataSourceRequest'
        - $ref: '#/components/schemas/ManualMetadataSourceRequest'
      discriminator:
        propertyName: type
        mapping:
          NONE: '#/components/schemas/NoneMetadataSourceRequest'
          FILE: '#/components/schemas/FileMetadataSourceRequest'
          URI: '#/components/schemas/UriMetadataSourceRequest'
          UPSTREAM: '#/components/schemas/UpstreamMetadataSourceRequest'
          MDQ: '#/components/schemas/MdqMetadataSourceRequest'
          MANUAL: '#/components/schemas/ManualMetadataSourceRequest'

    NoneMetadataSourceRequest:
      type: object
      description: Clears the metadata source.
      additionalProperties: false
      required: [type]
      properties:
        type:
          type: string
          const: NONE

    UriMetadataSourceRequest:
      type: object
      description: Metadata fetched from a single URL.
      additionalProperties: false
      required: [type, uri]
      properties:
        type:
          type: string
          const: URI
        uri:
          type: string
          format: uri
          examples: ["https://sp.example.org/metadata.xml"]

    UpstreamMetadataSourceRequest:
      type: object
      description: Metadata inherited from a parent aggregate. Valid for INDIVIDUAL trust relationships only.
      additionalProperties: false
      required: [type, parent_id, entity_id]
      properties:
        type:
          type: string
          const: UPSTREAM
        parent_id:
          type: string
          format: uuid
          description: Id of the parent AGGREGATE trust relationship.
        entity_id:
          type: string
          format: uri
          examples: ["https://sp.example.org/shibboleth"]

    MdqMetadataSourceRequest:
      type: object
      description: Metadata resolved on demand from an MDQ service. Valid for AGGREGATE trust relationships only.
      additionalProperties: false
      required: [type, base_url]
      properties:
        type:
          type: string
          const: MDQ
        base_url:
          type: string
          format: uri
          examples: ["https://mdq.example.org"]

    FileMetadataSourceRequest:
      type: object
      description: |
        Metadata from an uploaded file. `token` is the identifier returned by the out-of-band file
        upload; the server resolves and verifies it against the stored file.
      additionalProperties: false
      required: [type, token]
      properties:
        type:
          type: string
          const: FILE
        token:
          type: string
          description: Opaque reference to the uploaded file, obtained from the out-of-band upload.

    ManualMetadataSourceRequest:
      type: object
      description: Metadata described by hand for a single entity. Valid for INDIVIDUAL trust relationships only.
      additionalProperties: false
      required: [type, entity_id, valid_until, assertion_consumer_service]
      properties:
        type:
          type: string
          const: MANUAL
        entity_id:
          type: string
          format: uri
          examples: ["https://sp.example.org/shibboleth"]
        valid_until:
          type: string
          format: date-time
          description: When this manually-described metadata expires (ISO-8601).
          examples: ["2027-01-01T00:00:00Z"]
        assertion_consumer_service:
          $ref: '#/components/schemas/AssertionConsumerServiceRequest'
        signing_certificate:
          type: string
          description: Optional base64-encoded signing certificate. Omit for none.

    AssertionConsumerServiceRequest:
      type: object
      description: Where the service provider receives assertions.
      additionalProperties: false
      required: [location, binding]
      properties:
        location:
          type: string
          format: uri
          examples: ["https://sp.example.org/acs"]
        binding:
          $ref: '#/components/schemas/SamlBinding'
        index:
          type: integer
          format: int32
          default: 1
        is_default:
          type: boolean
          default: true

    SamlBinding:
      type: string
      enum: [HTTP_POST, HTTP_REDIRECT]

    TrustRelationshipSummary:
      type: object
      description: A summary of a trust relationship (also used for list items).
      required: [id, display_name, description, nature, status, version]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Server-assigned identifier.
          examples: [7f3a9c2e-4b1d-4c8a-9e2f-1a2b3c4d5e6f]
        display_name:
          type: string
          examples: [University Portal SP]
        description:
          type: string
          examples: [SAML SP for the university student portal]
        nature:
          $ref: '#/components/schemas/TrustNature'
        status:
          $ref: '#/components/schemas/TrustStatus'
        version:
          type: integer
          format: int32
          minimum: 1
          readOnly: true
          description: Version number of the trust relationship; increases each time it changes.
          examples: [1]

    TrustRelationshipPage:
      type: object
      description: A page of trust relationships with pagination metadata.
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TrustRelationshipSummary'
        page:
          $ref: '#/components/schemas/PageMetadata'

    PageMetadata:
      type: object
      description: Pagination metadata for a page of results.
      required: [size, number, total_elements, total_pages, number_of_elements]
      properties:
        size:
          type: integer
          format: int32
          description: Requested page size.
          examples: [20]
        number:
          type: integer
          format: int32
          description: Current page number (1-based; the first page is 1).
          examples: [1]
        total_elements:
          type: integer
          format: int64
          description: Total number of items across all pages matching the filters.
          examples: [145]
        total_pages:
          type: integer
          format: int32
          description: Total number of pages (0 when there are no items).
          examples: [8]
        number_of_elements:
          type: integer
          format: int32
          description: Number of items in the returned page.
          examples: [20]

    TrustNature:
      type: string
      description: |
        Whether the trust relationship covers a single entity (`INDIVIDUAL`) or a group of
        entities such as a federation (`AGGREGATE`).
      enum: [INDIVIDUAL, AGGREGATE]

    TrustStatus:
      type: string
      description: Lifecycle status of the trust relationship.
      enum: [DRAFT, READY, ACTIVATING, ACTIVE, INACTIVE]

    TrustRelationshipDetail:
      description: |
        Full view of a trust relationship. Extends the summary with the metadata source and profiles
        (shown by kind and status only), released attributes, activation diagnostics and discovered
        entity IDs.
      allOf:
        - $ref: '#/components/schemas/TrustRelationshipSummary'
        - type: object
          required:
            - metadata_source
            - profiles
            - released_attributes
            - activation_diagnostics
            - discovered_entity_ids
          properties:
            metadata_source:
              $ref: '#/components/schemas/MetadataSourceSummary'
            profiles:
              type: array
              description: One entry per profile, with its kind and whether it is active.
              items:
                $ref: '#/components/schemas/ProfileSummary'
            released_attributes:
              type: array
              items:
                $ref: '#/components/schemas/ReleasedAttribute'
            activation_diagnostics:
              $ref: '#/components/schemas/ActivationDiagnostics'
            discovered_entity_ids:
              type: array
              description: Entity IDs discovered while processing the metadata source.
              items:
                type: string
                format: uri
              examples:
                - ["https://sp.example.org/shibboleth", "https://idp.example.net/idp"]

    MetadataSourceSummary:
      type: object
      description: The kind of metadata source, without its details.
      required: [type]
      properties:
        type:
          $ref: '#/components/schemas/MetadataSourceType'

    MetadataSourceType:
      type: string
      description: |
        Where a trust relationship's metadata comes from. `NONE` means none is configured yet.
      enum: [NONE, FILE, URI, UPSTREAM, MANUAL, MDQ]

    ProfileSummary:
      type: object
      description: The kind of profile and whether it is active, without its settings.
      required: [type, status]
      properties:
        type:
          $ref: '#/components/schemas/ProfileType'
        status:
          $ref: '#/components/schemas/ProfileStatus'

    ProfileType:
      type: string
      enum: [SHIBBOLETH_SSO, SAML2_ATTRIBUTE_QUERY, SAML2_ARTIFACT_RESOLUTION, SAML2_ECP, SAML2_SSO, SAML2_LOGOUT]

    ProfileStatus:
      type: string
      description: Whether a profile is active.
      enum: [ACTIVE, INACTIVE]

    Saml2LogoutProfileConfigurationRequest:
      type: object
      description: |
        Partial update of the SAML2 Logout profile. Only the fields present are changed; omitted
        fields keep their current values.
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/ProfileStatus'
        inbound_flows:
          type: array
          items:
            type: string
        outbound_flows:
          type: array
          items:
            type: string
        message_signing_policy:
          $ref: '#/components/schemas/MessageSigningPolicy'
        request_signature_validation_policy:
          $ref: '#/components/schemas/RequestSignatureValidationPolicy'
        encryption_fallback_policy:
          $ref: '#/components/schemas/EncryptionFallbackPolicy'
        nameid_encryption_policy:
          $ref: '#/components/schemas/NameIdEncryptionPolicy'

    MessageSigningPolicy:
      type: string
      enum: [SIGN_BOTH, SIGN_RESPONSES_ONLY, SIGN_REQUESTS_ONLY, SIGN_NONE]

    RequestSignatureValidationPolicy:
      type: string
      enum: [REQUIRE_VALID_SIGNATURE, SKIP_VALIDATION]

    EncryptionFallbackPolicy:
      type: string
      enum: [FAIL_IF_CANNOT_ENCRYPT, DISABLE_ENCRYPTION_IF_NECESSARY]

    NameIdEncryptionPolicy:
      type: string
      enum: [ENCRYPT_NAMEIDS, DO_NOT_ENCRYPT_NAMEIDS]

    Saml2ArtifactResolutionProfileConfigurationRequest:
      type: object
      description: |
        Partial update of the SAML2 Artifact Resolution profile. Only the fields present are changed;
        omitted fields keep their current values.
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/ProfileStatus'
        inbound_flows:
          type: array
          items:
            type: string
        outbound_flows:
          type: array
          items:
            type: string
        message_signing_policy:
          $ref: '#/components/schemas/MessageSigningPolicy'
        request_signature_validation_policy:
          $ref: '#/components/schemas/RequestSignatureValidationPolicy'
        encryption_fallback_policy:
          $ref: '#/components/schemas/EncryptionFallbackPolicy'
        nameid_encryption_policy:
          $ref: '#/components/schemas/NameIdEncryptionPolicy'
        assertion_signing_policy:
          $ref: '#/components/schemas/AssertionSigningPolicy'
        assertion_encryption_policy:
          $ref: '#/components/schemas/AssertionEncryptionPolicy'
        attribute_encryption_policy:
          $ref: '#/components/schemas/AttributeEncryptionPolicy'

    AssertionSigningPolicy:
      type: string
      enum: [SIGN_ASSERTIONS, DO_NOT_SIGN_ASSERTIONS]

    AssertionEncryptionPolicy:
      type: string
      enum: [ENCRYPT_ASSERTIONS, DO_NOT_ENCRYPT_ASSERTIONS]

    AttributeEncryptionPolicy:
      type: string
      enum: [ENCRYPT_ATTRIBUTES, DO_NOT_ENCRYPT_ATTRIBUTES]

    Saml2AttributeQueryProfileConfigurationRequest:
      type: object
      description: |
        Partial update of the SAML2 Attribute Query profile. Only the fields present are changed;
        omitted fields keep their current values.
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/ProfileStatus'
        inbound_flows:
          type: array
          items:
            type: string
        outbound_flows:
          type: array
          items:
            type: string
        message_signing_policy:
          $ref: '#/components/schemas/MessageSigningPolicy'
        assertion_time_condition:
          $ref: '#/components/schemas/AssertionTimeCondition'
        assertion_lifetime:
          type: string
          format: duration
          description: ISO-8601 duration (e.g. PT5M).
          examples: ["PT5M"]
        assertion_signing_policy:
          $ref: '#/components/schemas/AssertionSigningPolicy'
        request_signature_validation_policy:
          $ref: '#/components/schemas/RequestSignatureValidationPolicy'
        encryption_fallback_policy:
          $ref: '#/components/schemas/EncryptionFallbackPolicy'
        nameid_encryption_policy:
          $ref: '#/components/schemas/NameIdEncryptionPolicy'
        assertion_encryption_policy:
          $ref: '#/components/schemas/AssertionEncryptionPolicy'
        attribute_encryption_policy:
          $ref: '#/components/schemas/AttributeEncryptionPolicy'
        friendly_name_randomization_policy:
          $ref: '#/components/schemas/FriendlyNameRandomizationPolicy'

    AssertionTimeCondition:
      type: string
      enum: [INCLUDE_NOT_BEFORE, OMIT_NOT_BEFORE]

    FriendlyNameRandomizationPolicy:
      type: string
      enum: [RANDOMIZED, STATIC]

    ShibbolethSsoProfileConfigurationRequest:
      type: object
      description: |
        Partial update of the Shibboleth SSO profile. Only the fields present are changed; omitted
        fields keep their current values.
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/ProfileStatus'
        inbound_flows:
          type: array
          items:
            type: string
        outbound_flows:
          type: array
          items:
            type: string
        post_authentication_flows:
          type: array
          items:
            type: string
        authentication_result_reuse_policy:
          $ref: '#/components/schemas/AuthenticationResultReusePolicy'
        max_authentication_age:
          type: string
          format: duration
          description: ISO-8601 duration (e.g. PT1H).
          examples: ["PT1H"]
        message_signing_policy:
          $ref: '#/components/schemas/MessageSigningPolicy'
        assertion_time_condition:
          $ref: '#/components/schemas/AssertionTimeCondition'
        assertion_lifetime:
          type: string
          format: duration
          description: ISO-8601 duration (e.g. PT5M).
          examples: ["PT5M"]
        assertion_signing_policy:
          $ref: '#/components/schemas/AssertionSigningPolicy'
        attribute_statement_policy:
          $ref: '#/components/schemas/AttributeStatementPolicy'
        nameid_format_precedence:
          type: array
          description: Ordered list of NameID format URIs.
          items:
            type: string

    AuthenticationResultReusePolicy:
      type: string
      enum: [ALLOW_REUSE, DISALLOW_REUSE]

    AttributeStatementPolicy:
      type: string
      enum: [INCLUDE_ATTRIBUTE_STATEMENT, OMIT_ATTRIBUTE_STATEMENT]

    Saml2EcpProfileConfigurationRequest:
      type: object
      description: |
        Partial update of the SAML2 ECP profile. Only the fields present are changed; omitted fields
        keep their current values.
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/ProfileStatus'
        inbound_flows:
          type: array
          items:
            type: string
        outbound_flows:
          type: array
          items:
            type: string
        message_signing_policy:
          $ref: '#/components/schemas/MessageSigningPolicy'
        assertion_time_condition:
          $ref: '#/components/schemas/AssertionTimeCondition'
        assertion_lifetime:
          type: string
          format: duration
          examples: ["PT5M"]
        assertion_signing_policy:
          $ref: '#/components/schemas/AssertionSigningPolicy'
        request_signature_validation_policy:
          $ref: '#/components/schemas/RequestSignatureValidationPolicy'
        encryption_fallback_policy:
          $ref: '#/components/schemas/EncryptionFallbackPolicy'
        nameid_encryption_policy:
          $ref: '#/components/schemas/NameIdEncryptionPolicy'
        authentication_result_reuse_policy:
          $ref: '#/components/schemas/AuthenticationResultReusePolicy'
        assertion_encryption_policy:
          $ref: '#/components/schemas/AssertionEncryptionPolicy'
        attribute_encryption_policy:
          $ref: '#/components/schemas/AttributeEncryptionPolicy'
        maximum_sp_session_lifetime:
          type: string
          format: duration
          examples: ["PT8H"]
        endpoint_validation_policy:
          $ref: '#/components/schemas/EndpointValidationPolicy'
        attribute_statement_policy:
          $ref: '#/components/schemas/AttributeStatementPolicy'
        friendly_name_randomization_policy:
          $ref: '#/components/schemas/FriendlyNameRandomizationPolicy'
        nameid_format_precedence:
          type: array
          items:
            type: string
        request_signing_requirement:
          $ref: '#/components/schemas/RequestSigningRequirement'

    EndpointValidationPolicy:
      type: string
      enum: [ALWAYS_VALIDATE_ENDPOINT, SKIP_VALIDATION_WHEN_REQUEST_SIGNED]

    RequestSigningRequirement:
      type: string
      enum: [REQUIRE_SIGNED_REQUESTS, ALLOW_UNSIGNED_REQUESTS]

    Saml2SsoProfileConfigurationRequest:
      type: object
      description: |
        Partial update of the SAML2 SSO profile (the fullest profile). Only the fields present are
        changed; omitted fields keep their current values.
      additionalProperties: false
      properties:
        status:
          $ref: '#/components/schemas/ProfileStatus'
        inbound_flows:
          type: array
          items:
            type: string
        outbound_flows:
          type: array
          items:
            type: string
        post_authentication_flows:
          type: array
          items:
            type: string
        authentication_result_reuse_policy:
          $ref: '#/components/schemas/AuthenticationResultReusePolicy'
        max_authentication_age:
          type: string
          format: duration
          examples: ["PT1H"]
        message_signing_policy:
          $ref: '#/components/schemas/MessageSigningPolicy'
        assertion_time_condition:
          $ref: '#/components/schemas/AssertionTimeCondition'
        assertion_lifetime:
          type: string
          format: duration
          examples: ["PT5M"]
        assertion_signing_policy:
          $ref: '#/components/schemas/AssertionSigningPolicy'
        request_signature_validation_policy:
          $ref: '#/components/schemas/RequestSignatureValidationPolicy'
        encryption_fallback_policy:
          $ref: '#/components/schemas/EncryptionFallbackPolicy'
        nameid_encryption_policy:
          $ref: '#/components/schemas/NameIdEncryptionPolicy'
        assertion_encryption_policy:
          $ref: '#/components/schemas/AssertionEncryptionPolicy'
        attribute_encryption_policy:
          $ref: '#/components/schemas/AttributeEncryptionPolicy'
        maximum_sp_session_lifetime:
          type: string
          format: duration
          examples: ["PT8H"]
        endpoint_validation_policy:
          $ref: '#/components/schemas/EndpointValidationPolicy'
        attribute_statement_policy:
          $ref: '#/components/schemas/AttributeStatementPolicy'
        friendly_name_randomization_policy:
          $ref: '#/components/schemas/FriendlyNameRandomizationPolicy'
        nameid_format_precedence:
          type: array
          items:
            type: string
        request_signing_requirement:
          $ref: '#/components/schemas/RequestSigningRequirement'

    UpdateReleasedAttributesRequest:
      type: object
      description: The complete set of attributes the trust relationship should release (full replacement).
      additionalProperties: false
      required: [attributes]
      properties:
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/ReleasedAttribute'

    ReleasedAttribute:
      type: object
      description: An attribute released by the trust relationship.
      additionalProperties: false
      required: [id, display_name]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
          examples: [givenName]

    ActivationDiagnostics:
      type: object
      description: Outcome and log of the most recent activation attempt.
      required: [status, origin, started_at, completed_at, log_entries]
      properties:
        status:
          $ref: '#/components/schemas/ActivationStatus'
        origin:
          type: string
          description: Where the activation ran (empty when there has been no activation yet).
          examples: ["worker-1@host.example.org"]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        log_entries:
          type: array
          items:
            $ref: '#/components/schemas/ActivationLogEntry'

    ActivationStatus:
      type: string
      description: |
        Outcome of the last activation attempt. `NO_DATA` means none has completed.
      enum: [NO_DATA, SUCCEEDED, FAILED]

    ActivationLogEntry:
      type: object
      required: [timestamp, level, message]
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          $ref: '#/components/schemas/LogLevel'
        message:
          type: string

    LogLevel:
      type: string
      enum: [DEBUG, INFO, WARNING, ERROR, CRITICAL]

    Problem:
      type: object
      description: |
        Error response in the standard problem format (RFC 7807). `code` identifies the specific
        error; `type`, `title`, `status` and `detail` describe it.
      required: [type, title, status, code]
      properties:
        type:
          type: string
          format: uri
          description: Problem type URI under https://jans.io/shibboleth-idp/problems/.
          examples: [https://jans.io/shibboleth-idp/problems/required_value_missing]
        title:
          type: string
          examples: [Required value missing]
        status:
          type: integer
          format: int32
          examples: [400]
        detail:
          type: string
          examples: ["display_name must not be blank"]
        instance:
          type: string
          format: uri-reference
        code:
          type: string
          description: Stable, machine-readable error code identifying what went wrong.
          examples: [required_value_missing]
        violations:
          type: array
          description: Field-level validation failures, when applicable.
          items:
            $ref: '#/components/schemas/Violation'

    Violation:
      type: object
      required: [field, code]
      properties:
        field:
          type: string
          examples: [display_name]
        code:
          type: string
          examples: [required_value_missing]
        message:
          type: string
          examples: ["must not be blank"]

  responses:

    BadRequest:
      description: The request is malformed or fails a validation rule.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: No trust relationship exists with the given id.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Conflict:
      description: The operation is not allowed in the trust relationship's current state.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
