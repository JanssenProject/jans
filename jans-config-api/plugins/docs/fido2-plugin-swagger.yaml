openapi: 3.0.1
info:
  title: Jans Config API - Fido2
  contact:
    name: Gluu Support
    url: https://support.gluu.org
    email: xxx@gluu.org
  license:
    name: Apache 2.0
    url: https://github.com/JanssenProject/jans/blob/main/LICENSE
  version: 1.0.0
servers:
- url: https://jans.io/
  description: The Jans server
tags:
- name: Fido2 - Configuration
- name: Fido2 - Registration
- name: Fido2 - Metrics
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: "https://{op-hostname}/.../token"
          scopes:
            https://jans.io/oauth/config/fido2.readonly: View fido2 config related
              information
            https://jans.io/oauth/config/fido2.write: Manage fido2 config related
              information
            https://jans.io/oauth/config/fido2.delete: Delete fido2 config related
              information
            https://jans.io/oauth/config/fido2-metrics.readonly: View fido2 metrics
              related information
            https://jans.io/oauth/config/fido2.admin: Admin to manage fido2 related
              information
            ? ""
            : ""
