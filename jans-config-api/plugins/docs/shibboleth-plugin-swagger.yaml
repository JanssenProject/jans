        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.readonly
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.admin
    delete:
      tags:
      - OAuth - OpenID Connect - Clients
      summary: Marks Trust Relationship for deletion
      description: Marks Trust Relationship for deletion
      operationId: delete-shibboleth-trust-by-inum
      parameters:
      - name: inum
        in: path
        description: TrustRelationship inum
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: InternalServerError
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.delete
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.admin
  /shibboleth/trust-relationship/{fed-id}/discovery/entities:
    get:
      tags:
      - Shibboleth - Trust Relationship
      summary: Gets list of federation entity ID based on federation ID
      description: Gets list of federation entity ID based on federation ID
      operationId: get-entities-by-fed-id
      parameters:
      - name: fedId
        in: path
        description: Federation ID
        required: true
        schema:
          type: string
      - name: limit
        in: query
        description: Search size - max size of the results to return
        schema:
          type: integer
          format: int32
          default: 50
      - name: startIndex
        in: query
        description: The 1-based index of the first query result
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StringPagedResult"
              examples:
                Response json example:
                  description: Response json example
                  value: ""
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.readonly
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.admin
  /shibboleth/trust-relationship/{inum}release-policyeffective:
    get:
      tags:
      - Shibboleth - Trust Relaattributetionship
      summary: Get  list Trust Relationship
      description: Get attribute list Trust Relationship
      operationId: get-shibboleth-trust-attribute-list
      parameters:
      - name: inum
        in: path
