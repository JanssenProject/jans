      description: Gets list of trusted service providers by name
      operationId: get-shibboleth-trust-by-name
      parameters:
      - name: name
        in: path
        description: Trust Relationship Name
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrustRelationship"
              examples:
                Response json example:
                  description: Response json example
                  value: ""
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.readonly
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.admin
components:
  schemas:
    ShibbolethPluginConfiguration:
      type: object
      properties:
        applicationName:
          type: string
        enabled:
          type: boolean
        trustRelationshipDn:
          type: string
        shibbolethMetadataDir:
          type: string
        shibbolethMetadataFile:
          type: string
        shibbolethMetadataFilePattern:
          type: string
    MetadataSource:
      required:
      - metadataSourceType
      type: object
      properties:
        metadataSourceType:
          type: string
          description: Metadata Source Type
          enum:
          - none
          - file
          - uri
          - upstream
          - manual
          - mdq
        metadataStr:
          type: string
          description: Metadata Source Details
      description: Metadata source for Trust Relationship.
    SAMLProfile:
      type: object
      properties:
        profileType:
          type: string
          description: Type of SAML Profile Type
          enum:
          - SHIBBOLETH_SSO
          - SAML2_ATTRIBUTE_QUERY
          - SAML2_ARTIFACT_RESOLUTION
          - SAML2_ECP
          - SAML2_SSO
          - SAML2_LOGOUT
        profileStatus:
          type: string
          description: Indicates if the profile is active or inactive
          enum:
          - active
          - inactive
        inboundFlows:
          type: array
          description: Array of names of inbound interceptor flows to run prior to
            message processing.
          items:
            type: string
            description: Array of names of inbound interceptor flows to run prior
              to message processing.
        outboundFlows:
          type: array
          description: Array of names of outbound interceptor flows to run prior to
            message processing.
          items:
            type: string
            description: Array of names of outbound interceptor flows to run prior
              to message processing.
        postAuthenticationFlows:
          type: array
          description: Array of names of inbound interceptor flows to run after successful
            authentication.
          items:
            type: string
            description: Array of names of inbound interceptor flows to run after
              successful authentication.
        authResultReuse:
          type: boolean
          description: Indicates if authentication results can be reused
        maxAuthenticationAge:
          type: object
          properties:
            seconds:
              type: integer
              format: int64
            zero:
              type: boolean
            nano:
              type: integer
              format: int32
            negative:
              type: boolean
            positive:
              type: boolean
            units:
              type: array
              items:
                type: object
                properties:
                  durationEstimated:
                    type: boolean
                  duration:
                    type: object
                    properties:
                      seconds:
                        type: integer
                        format: int64
                      zero:
                        type: boolean
                      nano:
                        type: integer
                        format: int32
                      negative:
                        type: boolean
                      positive:
                        type: boolean
                  timeBased:
                    type: boolean
                  dateBased:
                    type: boolean
          description: ISO-8601 duration format PnDTnHnMn.nS. E.g. PT15M. Indicates
            how long until an AuthenticationResult can be reused for the current request
        messageSigningPolicy:
          type: string
          description: Policy regarding signing SAML messages for integrity and authenticity
          enum:
          - SIGN_BOTH
          - SIGN_RESPONSES_ONLY
          - SIGN_REQUESTS_ONLY
          - SIGN_NONE
        validationRequestSignature:
          type: boolean
          description: Indicates if request signature is to be validated or skiped
        encryptionFallbackPolicy:
          type: string
          description: Indicates if to automatically disable encryption if the RP
            doesn't possess a suitable key
          enum:
          - FAIL_IF_CANNOT_ENCRYPT
          - DISABLE_ENCRYPTION_IF_NECESSARY
        encryptNameId:
          type: boolean
          description: Indicates whether to encrypt name IDs
        signAssertion:
          type: boolean
          description: Indicates whether to sign assertions
        encryptAssertion:
          type: boolean
          description: Indicates whether to encrypt assertions
        encryptAttribute:
          type: boolean
          description: Indicates whether to encrypt attributes
    TrustRelationship:
      required:
      - displayName
      - entityType
      - metadataSource
      type: object
      properties:
        dn:
          type: string
        inum:
          type: string
          description: Unique identifier
        displayName:
          maxLength: 60
          minLength: 0
          type: string
          description: Trust Relationship display name.
        description:
          maxLength: 4000
          minLength: 0
          type: string
          description: Description of the Trust Relationship.
        entityType:
          type: string
          description: Nature of Trust Relationship.
          enum:
          - individual
          - aggregate
        metadataSource:
          $ref: "#/components/schemas/MetadataSource"
        releasedAttributes:
          type: array
          items:
            type: string
        entityIds:
          uniqueItems: true
          type: array
          description: Uniquely identifies the entity across federated systems.
          items:
            type: string
            description: Uniquely identifies the entity across federated systems.
        jansContainerFedId:
          type: string
          description: DN of the Federation
        jansProfileConfiguration:
          type: array
          description: SAML profiles.
          items:
            $ref: "#/components/schemas/SAMLProfile"
        status:
          type: string
          enum:
          - draft
          - valid
          - pending
          - active
          - inactive
          - error
        version:
          type: integer
          description: Trust Relationship version
          format: int32
        baseDn:
          type: string
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        description:
          type: string
    StringPagedResult:
      type: object
      properties:
        start:
          type: integer
          format: int32
        totalEntriesCount:
          type: integer
          format: int32
        entriesCount:
          type: integer
          format: int32
        entries:
          type: array
          items:
            type: string
    TrustRelationshipPagedResult:
      type: object
      properties:
        start:
          type: integer
          format: int32
        totalEntriesCount:
          type: integer
          format: int32
        entriesCount:
          type: integer
          format: int32
        entries:
          type: array
          items:
            $ref: "#/components/schemas/TrustRelationship"
    TrustRelationshipForm:
      required:
      - trustRelationship
      type: object
      properties:
        trustRelationship:
          $ref: "#/components/schemas/TrustRelationship"
        metaDataFile:
          type: string
          format: binary
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: "https://{op-hostname}/.../token"
          scopes:
            https://jans.io/oauth/config/shibboleth.readonly: View Shibboleth related
              information
            https://jans.io/oauth/config/shibboleth.write: Manage Shibboleth related
              information
            https://jans.io/oauth/config/shibboleth.admin: Admin to manage Shibboleth
              related information
            https://jans.io/oauth/config/shibboleth/config.readonly: View Shibboleth
              config related information
            https://jans.io/oauth/config/shibboleth/config.write: Manage Shibboleth
              config related information
            https://jans.io/oauth/config/shibboleth/config.admin: Admin to manage
              Shibboleth config related information
            https://jans.io/oauth/config/shibboleth/trust.readonly: View Shibboleth
              trust relationship related information
            https://jans.io/oauth/config/shibboleth/trust.write: Manage Shibboleth
              trust relationship related information
            https://jans.io/oauth/config/shibboleth/trust.delete: Manage Shibboleth
              trust relationship related information
            https://jans.io/oauth/config/shibboleth/trust.admin: Admin to manage Shibboleth
              trust relationship related information
            https://jans.io/oauth/config/read-all: Super admin for viewing application
              resource information
            https://jans.io/oauth/config/write-all: Super admin for updating application
              resource information
            https://jans.io/oauth/config/delete-all: Super admin for deleting application
              resource information
