          type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                Response json example:
                  description: Response json example
                  value: ""
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.readonly
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.admin
  /shibboleth/trust-relationship/{inum}saml-profiles:
    get:
      tags:
      - Shibboleth - Trust Relationship
      summary: Gets configured SAML profiles for a trust relationship
      description: Gets configured SAML profiles for a trust relationship
      operationId: get-shibboleth-trust-saml-profiles
      parameters:
      - name: inum
        in: path
        description: Trust Relationship identifier
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SAMLProfile"
              examples:
                Response json example:
                  description: Response json example
                  value: ""
        "401":
          description: Unauthorized
        "404":
          description: Not Found
        "500":
          description: Internal Server Error
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.readonly
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.admin
    put:
      tags:
      - Shibboleth - Trust Relationship
      summary: Updates configured SAML profiles for a trust relationship
      description: Updates configured SAML profiles for a trust relationship
      operationId: post-shibboleth-trust_1
      parameters:
      - name: inum
        in: path
        description: Trust Relationship identifier
        required: true
        schema:
          type: string
      requestBody:
        description: Trust Relationship object
        content:
          multipart/form-data:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/SAMLProfile"
            examples:
              Request example:
                description: Request example
                value: ""
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SAMLProfile"
              examples:
                Response json example:
                  description: Response json example
                  value: ""
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
