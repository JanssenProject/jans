tags:
- name: Shibboleth - Plugin Configuration
- name: Shibboleth - Trust Relationship
paths:
  /shibboleth/shibboleth-plugin-config:
    get:
      tags:
      - Shibboleth - Plugin Configuration
      summary: Get Shibboleth Plugin configuration properties
      description: Gets Shibboleth Plugin configuration properties
      operationId: get-shibboleth-plugin-config
      responses:
        "200":
          description: Shibboleth Plugin configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShibbolethPluginConfiguration"
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/config.readonly
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/config.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/config.admin
      - oauth2:
        - https://jans.io/oauth/config/shibboleth.readonly
      - oauth2:
        - https://jans.io/oauth/config/read-all
    put:
      tags:
      - Shibboleth - Plugin Configuration
      summary: Update Shibboleth Plugin properties
      description: Update Shibboleth Plugin properties
      operationId: update-shibboleth-plugin-config
      requestBody:
        description: GluuAttribute object
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShibbolethPluginConfiguration"
            examples:
              Request example:
                description: Request example
                value: ""
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShibbolethPluginConfiguration"
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/config.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/config.admin
    patch:
      tags:
      - Shibboleth - Plugin Configuration
      summary: Partially modifies Shibboleth Plugin configuration properties.
      description: Partially modifies Shibboleth Plugin Configuration properties.
      operationId: patch-shibboleth-plugin-config
      requestBody:
        description: GluuAttribute object
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShibbolethPluginConfiguration"
            examples:
              Request example:
                description: Request example
                value: ""
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShibbolethPluginConfiguration"
        "401":
          description: Unauthorized
        "500":
          description: InternalServerError
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/config.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/config.admin
  /shibboleth/trust-relationship:
    get:
      tags:
      - Shibboleth - Trust Relationship
      summary: Gets trusted service providers
      description: Gets list of trusted service providers
      operationId: get-shibboleth-trust
      parameters:
      - name: limit
        in: query
        description: Search size - max size of the results to return
        schema:
          type: integer
          format: int32
          default: 50
      - name: pattern
        in: query
        description: Search pattern
        schema:
          type: string
          default: ""
      - name: startIndex
        in: query
        description: Index of the first query result
        schema:
          type: integer
          format: int32
          default: 0
      - name: sortBy
        in: query
        description: Attribute whose value will be used to order the returned response
        schema:
          type: string
          default: inum
      - name: sortOrder
        in: query
        description: Order in which the sortBy param is applied. Allowed values are
          "ascending" and "descending"
        schema:
          type: string
          default: ascending
      - name: PAGE
        in: query
        description: "Page number to be retrieved, the number of pages is the total\
          \ number of records divided by the page size (rounded up)"
        schema:
          type: integer
          format: int32
          default: 1
      - name: fieldValuePair
        in: query
        description: Field and value pair for searching
        schema:
          type: string
          default: ""
        examples:
          Field value example:
            description: Field value example
            value: "applicationType=web,persistClientAuthorizations=true"
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustRelationshipPagedResult"
              examples:
                Response json example:
                  description: Response json example
                  value: ""
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.readonly
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.admin
    put:
      tags:
      - Shibboleth - Trust Relationship
      summary: Update Trust Relationship details
      description: Update Trust Relationship details
      operationId: put-shibboleth-trust
      requestBody:
        description: Trust Relationship object
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TrustRelationshipForm"
            examples:
              Request example:
                description: Request example
                value: ""
      responses:
        "200":
          description: Updated Trust Relationship
          content:
            multipart/form-data:
              schema:
                $ref: "#/components/schemas/TrustRelationship"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.admin
    post:
      tags:
      - Shibboleth - Trust Relationship
      summary: Adds trusted service provider
      description: Adds a new trusted service provider
      operationId: post-shibboleth-trust
      requestBody:
        description: Trust Relationship object
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrustRelationship"
            examples:
              Request example:
                description: Request example
                value: ""
      responses:
        "201":
          description: Newly created Trust Relationship
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustRelationship"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: InternalServerError
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
      security:
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.write
      - oauth2:
        - https://jans.io/oauth/config/shibboleth/trust.admin
  /shibboleth/trust-relationship/{inum}:
    get:
      tags:
      - Shibboleth - Trust Relationship
