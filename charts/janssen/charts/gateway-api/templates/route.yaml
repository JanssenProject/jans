{{- $fullName := include "gateway-api.fullname" . -}}
{{- $namespace := .Release.Namespace -}}
{{- $gatewayNamespace := .Values.routes.gatewayNamespace | default $namespace -}}
{{- $httpSection := .Values.routes.httpSectionName | default "http" -}}
{{- $httpsSection := .Values.routes.httpsSectionName | default "https" -}}
{{- $authSvc := index .Values.global "auth-server" "authServerServiceName" -}}
{{- $configSvc := index .Values.global "config-api" "configApiServerServiceName" -}}
{{- $fido2Svc := .Values.global.fido2.fido2ServiceName -}}
{{- $scimSvc := .Values.global.scim.scimServiceName -}}
{{- $casaSvc := .Values.global.casa.casaServiceName -}}


{{- /* ======================================================== */}}
{{- /* 1. AUTH SERVER ROUTES                                    */}}
{{- /* ======================================================== */}}

{{- /* Auth Server: Public (HTTP/HTTPS No Redirect) */}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-auth-server-public
  namespace: {{ $namespace }}
  labels:
    app: {{ $fullName }}-routes
{{- if .Values.routes.labels }}
{{- toYaml .Values.routes.labels | nindent 4 }}
{{- end }}
{{- if .Values.routes.annotations }}
  annotations:
{{- toYaml .Values.routes.annotations | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ $gatewayNamespace }}
  hostnames:
  - {{ .Values.global.fqdn | quote }}
  rules:
  {{- if index .Values.global "auth-server" "ingress" "openidConfigEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/openid-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/.well-known/openid-configuration
    backendRefs:
    - name: {{ $authSvc }}
      port: 8080
  {{- end }}
  {{- if index .Values.global "auth-server" "ingress" "deviceCodeEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /device-code
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/device_authorization.htm
    backendRefs:
    - name: {{ $authSvc }}
      port: 8080
  {{- end }}
  {{- if index .Values.global "auth-server" "ingress" "firebaseMessagingEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /firebase-messaging-sw.js
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/firebase-messaging-sw.js
    backendRefs:
    - name: {{ $authSvc }}
      port: 8080
  {{- end }}
  {{- if index .Values.global "auth-server" "ingress" "uma2ConfigEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/uma2-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/restv1/uma2-configuration
    backendRefs:
    - name: {{ $authSvc }}
      port: 8080
  {{- end }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/webfinger
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/.well-known/webfinger
    backendRefs:
    - name: {{ $authSvc }}
      port: 8080
  {{- end }}
  {{- if and (index .Values.global "auth-server" "lockEnabled") (index .Values.global "auth-server" "ingress" "lockConfigEnabled") }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/lock-server-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/api/v1/configuration
    backendRefs:
    - name: {{ $authSvc }}
      port: 8080
  {{- end }}
  {{- if index .Values.global "auth-server" "ingress" "authzenConfigEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/authzen-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/restv1/authzen-configuration
    backendRefs:
    - name: {{ $authSvc }}
      port: 8080
  {{- end }}


{{- /* Auth Server: Secure (HTTPS) */}}
{{- if index .Values.global "auth-server" "ingress" "authServerEnabled" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-auth-server-secure
  namespace: {{ $namespace }}
  labels:
    app: {{ $fullName }}-routes
{{- if .Values.routes.labels }}
{{- toYaml .Values.routes.labels | nindent 4 }}
{{- end }}
{{- if .Values.routes.annotations }}
  annotations:
{{- toYaml .Values.routes.annotations | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ $gatewayNamespace }}
    sectionName: {{ $httpsSection }}
  hostnames:
  - {{ .Values.global.fqdn | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /jans-auth
    backendRefs:
    - name: {{ $authSvc }}
      port: 8080

{{- /* Auth Server: Redirect (HTTP -> HTTPS) */}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-auth-server-redirect
  namespace: {{ $namespace }}
  labels:
    app: {{ $fullName }}-routes
{{- if .Values.routes.labels }}
{{- toYaml .Values.routes.labels | nindent 4 }}
{{- end }}
{{- if .Values.routes.annotations }}
  annotations:
{{- toYaml .Values.routes.annotations | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ $gatewayNamespace }}
    sectionName: {{ $httpSection }}
  hostnames:
  - {{ .Values.global.fqdn | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /jans-auth
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
{{- end }}


