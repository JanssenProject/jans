{{- if and (index .Values.global "auth-server" "lockEnabled") (index .Values.global "auth-server" "ingress" "lockAuditEnabled") }}
---
{{- /* ======================================================== */}}
{{- /* 6. gRPC APPS                                             */}}
{{- /* These endpoints use gRPC                                 */}}
{{- /* ======================================================== */}}
apiVersion: gateway.networking.k8s.io/v1
{{- if ne .Values.gateway.className "nginx" }}
kind: HTTPRoute
{{- else }}
kind: GRPCRoute
{{- end }}
metadata:
  name: {{ $fullName }}-grpc-routes
  namespace: {{ $namespace }}
  labels:
    app: {{ $fullName }}-routes
{{- if .Values.routes.labels }}
{{- toYaml .Values.routes.labels | nindent 4 }}
{{- end }}
{{- if .Values.routes.annotations }}
  annotations:
{{- toYaml .Values.routes.annotations | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
    namespace: {{ $gatewayNamespace }}
    sectionName: {{ $httpsSection }}
  hostnames:
  - {{ .Values.global.fqdn | quote }}
  rules:
  {{- /* 1. Lock Server Audit */}}
  {{- /* List all routable methods explicitly to satisfy different gateway implementation */}}
  {{- if ne .Values.gateway.className "nginx" }}
  - matches:
    - path:
        type: PathPrefix
        value: /io.jans.lock.audit.AuditService
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /jans-auth/io.jans.lock.audit.AuditService
    backendRefs:
    - name: {{ $authSvc }}-grpc
      port: 50051
  {{- else }}
  - matches:
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessLog
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessBulkLog
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessHealth
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessBulkHealth
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessTelemetry
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessBulkTelemetry
    {{- if .Values.additionalConfig.nginx.enableAuditGrpcRewriteSnippets }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: gateway.nginx.org
        kind: SnippetsFilter
        name: {{ .Release.Name }}-nginx-audit-grpc-rewrite
    {{- end }}
    backendRefs:
    - name: {{ $authSvc }}-grpc
      port: 50051
  {{- end }}
{{- end }}
