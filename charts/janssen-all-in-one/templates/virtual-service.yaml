{{- if .Values.istio.ingress }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ .Release.Name }}-istio-aio
  namespace: {{.Release.Namespace}}
  labels:
    app: {{ .Release.Name }}-{{ include "janssen-all-in-one.name" . }}-aio
{{ include "janssen-all-in-one.labels" . | indent 4 }}
{{- if .Values.additionalLabels }}
{{ toYaml .Values.additionalLabels | indent 4 }}
{{- end }}
{{- if or (.Values.additionalAnnotations) (.Values.customAnnotations.virtualService) }}
  annotations:
{{- if .Values.additionalAnnotations }}
{{ toYaml .Values.additionalAnnotations | indent 4 }}
{{- end }}
{{- if .Values.customAnnotations.virtualService }}
{{ toYaml .Values.customAnnotations.virtualService | indent 4 }}
{{- end }}
{{- end }}
spec:
  hosts:
  - {{ .Values.fqdn }}
{{- if .Values.istio.gateways }}
  gateways:
{{ toYaml .Values.istio.gateways | indent 2 }}
{{- else }}
  gateways:
  - {{ .Release.Name }}-global-gtw
{{- end }}
  http:
  {{- /* auth-server routes */}}
  {{ if index .Values "auth-server" "ingress" "openidConfigEnabled" -}}
  - name: "{{ .Release.Name }}-istio-openid-config"
    match:
    - uri:
        prefix: "/.well-known/openid-configuration"
    rewrite:
      uri: "/jans-auth/.well-known/openid-configuration"
    route:
      - destination:
          host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
          port:
            number: 8080
        weight: 100
  {{- end }}
  {{ if index .Values "auth-server" "ingress" "deviceCodeEnabled" -}}
  - name: "{{ .Release.Name }}-istio-device-code"
    match:
    - uri:
        prefix: "/device-code"
    rewrite:
      uri: "/jans-auth/device_authorization.htm"
    route:
      - destination:
          host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
          port:
            number: 8080
        weight: 100
  {{- end }}
  {{ if index .Values "auth-server" "ingress" "firebaseMessagingEnabled" -}}
  - name: "{{ .Release.Name }}-istio-firebase-messaging"
    match:
    - uri:
        prefix: "/firebase-messaging-sw.js"
    rewrite:
      uri: "/jans-auth/firebase-messaging-sw.js"
    route:
      - destination:
          host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
          port:
            number: 8080
        weight: 100
  {{- end }}
  {{ if index .Values "auth-server" "ingress" "uma2ConfigEnabled" -}}
  - name: "{{ .Release.Name }}-istio-uma2-config"
    match:
    - uri:
        prefix: "/.well-known/uma2-configuration"
    rewrite:
      uri: "/jans-auth/restv1/uma2-configuration"
    route:
      - destination:
          host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
          port:
            number: 8080
        weight: 100
  {{- end }}
  {{ if index .Values "auth-server" "ingress" "webfingerEnabled" -}}
  - name: "{{ .Release.Name }}-istio-webfinger"
    match:
    - uri:
        prefix: "/.well-known/webfinger"
    rewrite:
      uri: "/jans-auth/.well-known/webfinger"
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}
  {{ if index .Values "auth-server" "ingress" "authServerEnabled" -}}
  - name: "{{ .Release.Name }}-istio-cn"
    match:
    - uri:
        prefix: "/jans-auth"
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
  {{- end }}
  {{ if index .Values "auth-server" "ingress" "lockConfigEnabled" -}}
  - name: "{{ .Release.Name }}-istio-lock-config"
    match:
    - uri:
        prefix: "/.well-known/lock-server-configuration"
    rewrite:
      uri: "/jans-auth/api/v1/configuration"
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}
  {{ if index .Values "auth-server" "ingress" "authzenConfigEnabled" -}}
  - name: "{{ .Release.Name }}-istio-authzen-config"
    match:
    - uri:
        prefix: "/.well-known/authzen-configuration"
    rewrite:
      uri: "/jans-auth/restv1/authzen-configuration"
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}

  {{- /* casa routes */}}
  {{ if .Values.casa.ingress.casaEnabled }}
  - name: {{ .Release.Name }}-istio-casa
    match:
    - uri:
        prefix: /jans-casa
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}

  {{- /* config-api routes */}}
  {{ if index .Values "config-api" "ingress" "configApiEnabled" -}}
  - name: {{ .Release.Name }}-istio-config-api
    match:
    - uri:
        prefix: /jans-config-api
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}

  {{- /* fido2 routes */}}
  {{- if .Values.fido2.ingress.fido2ConfigEnabled }}
  - name: {{ .Release.Name }}-istio-fido2-configuration
    match:
    - uri:
        prefix: /.well-known/fido2-configuration
    rewrite:
      uri: /jans-fido2/restv1/configuration
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}
  {{- if .Values.fido2.ingress.fido2Enabled }}
  - name: {{ .Release.Name }}-istio-fido2
    match:
    - uri:
        prefix: "/jans-fido2"
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}
  {{- if .Values.fido2.ingress.fido2WebauthnEnabled }}
  - name: {{ .Release.Name }}-istio-webauthn
    match:
    - uri:
        prefix: /.well-known/webauthn
    rewrite:
      uri: /jans-fido2/restv1/webauthn/configuration
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}

  {{- /* scim routes */}}
  {{- if .Values.scim.ingress.scimConfigEnabled }}
  - name: {{ .Release.Name }}-istio-scim-config
    match:
    - uri:
        prefix: /.well-known/scim-configuration
    rewrite:
      uri: /jans-scim/restv1/scim-configuration
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}
  {{- if .Values.scim.ingress.scimEnabled }}
  - name: {{ .Release.Name }}-istio-scim
    match:
    - uri:
        prefix: "/jans-scim"
    route:
    - destination:
        host: {{ .Values.service.name  }}.{{ .Release.Namespace  }}.svc.cluster.local
        port:
          number: 8080
      weight: 100
  {{- end }}
{{- end }}
