{{- if index .Values "gateway-api" "enabled" -}}
{{- $fullName := include "janssen-all-in-one.fullname" . -}}
{{- $namespace := .Release.Namespace -}}
{{- $svcName := .Values.service.name -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ index .Values "gateway-api" "gateway" "name" }}
  namespace: {{ $namespace }}
  labels:
    app: {{ $fullName }}-gateway
{{- if index .Values "gateway-api" "gateway" "labels" }}
{{- toYaml (index .Values "gateway-api" "gateway" "labels") | nindent 4 }}
{{- end }}
{{- if index .Values "gateway-api" "gateway" "annotations" }}
  annotations:
{{- toYaml (index .Values "gateway-api" "gateway" "annotations") | nindent 4 }}
{{- end }}
spec:
  gatewayClassName: {{ index .Values "gateway-api" "gateway" "className" }}
  {{- if or (index .Values "gateway-api" "gateway" "infrastructure" "labels") (index .Values "gateway-api" "gateway" "infrastructure" "annotations") (index .Values "gateway-api" "gateway" "infrastructure" "parametersRef") (and (eq (index .Values "gateway-api" "gateway" "className") "airlock-microgateway") (index .Values "gateway-api" "additionalConfig" "airlock" "createLbService")) }}
  infrastructure:
    {{- if index .Values "gateway-api" "gateway" "infrastructure" "labels" }}
    labels:
      {{- toYaml (index .Values "gateway-api" "gateway" "infrastructure" "labels") | nindent 6 }}
    {{- end }}
    {{- if index .Values "gateway-api" "gateway" "infrastructure" "annotations" }}
    annotations:
      {{- toYaml (index .Values "gateway-api" "gateway" "infrastructure" "annotations") | nindent 6 }}
    {{- end }}
    {{- if index .Values "gateway-api" "gateway" "infrastructure" "parametersRef" }}
    parametersRef:
      {{- toYaml (index .Values "gateway-api" "gateway" "infrastructure" "parametersRef") | nindent 6 }}
    {{- else if and (eq (index .Values "gateway-api" "gateway" "className") "airlock-microgateway") (index .Values "gateway-api" "additionalConfig" "airlock" "createLbService") }}
    parametersRef:
      group: microgateway.airlock.com
      kind: GatewayParameters
      name: airlock-gw-params
    {{- end }}
  {{- end }}
  {{- if and (index .Values "gateway-api" "gateway" "attachLbIp") (.Values.lbIp) }}
  addresses:
  - type: IPAddress
    value: {{ .Values.lbIp }}
  {{- end }}
  listeners:
  - name: http
    port: {{ index .Values "gateway-api" "gateway" "httpPort" }}
    protocol: HTTP
  - name: https
    port: {{ index .Values "gateway-api" "gateway" "httpsPort" }}
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: {{ index .Values "gateway-api" "gateway" "tlsSecretName" }}

{{- /* Start of GatewayParameters definition */}}
{{- if and (eq (index .Values "gateway-api" "gateway" "className") "airlock-microgateway") (index .Values "gateway-api" "additionalConfig" "airlock" "createLbService") }}
---

apiVersion: microgateway.airlock.com/v1alpha1
kind: GatewayParameters
metadata:
  name: airlock-gw-params
  namespace: {{ $namespace }}
spec:
  kubernetes:
    service:
      type: LoadBalancer
{{- end }}
{{- /* End of GatewayParameters definition */}}

{{- /* Start of GatewayClass definition */}}
{{- if and (eq (index .Values "gateway-api" "gateway" "className") "envoy") (index .Values "gateway-api" "additionalConfig" "envoy" "createGatewayClass") }}
---

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
{{- end }}
{{- /* End of GatewayClass definition */}}

{{- if and (eq (index .Values "gateway-api" "gateway" "className") "cilium") (index .Values "gateway-api" "additionalConfig" "cilium" "ipPoolBlocks") }}
---

apiVersion: "cilium.io/v2"
kind: CiliumLoadBalancerIPPool
metadata:
  name: {{ $fullName }}-cilium-ip-pool
spec:
  blocks:
{{- toYaml (index .Values "gateway-api" "additionalConfig" "cilium" "ipPoolBlocks") | nindent 4 }}
{{- end }}

---
{{- /* ======================================================== */}}
{{- /* ROUTE 1: PUBLIC CONFIGURATION (HTTP & HTTPS)             */}}
{{- /* These endpoints can be accessible via HTTP (No Redirect) */}}
{{- /* ======================================================== */}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-routes-public
  namespace: {{ $namespace }}
  labels:
    app: {{ $fullName }}-routes
{{- if index .Values "gateway-api" "routes" "labels" }}
{{- toYaml (index .Values "gateway-api" "routes" "labels") | nindent 4 }}
{{- end }}
{{- if index .Values "gateway-api" "routes" "annotations" }}
  annotations:
{{- toYaml (index .Values "gateway-api" "routes" "annotations") | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: {{ index .Values "gateway-api" "gateway" "name" }}
    # No sectionName: Attaches to ALL listeners (HTTP and HTTPS)
  hostnames:
  - {{ .Values.fqdn | quote }}
  rules:

  {{- /* 1. OpenID Configuration */}}
  {{- if index .Values "auth-server" "ingress" "openidConfigEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/openid-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/.well-known/openid-configuration
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 2. Device Code */}}
  {{- if index .Values "auth-server" "ingress" "deviceCodeEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /device-code
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/device_authorization.htm
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 3. Firebase Messaging */}}
  {{- if index .Values "auth-server" "ingress" "firebaseMessagingEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /firebase-messaging-sw.js
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/firebase-messaging-sw.js
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 4. UMA2 Config */}}
  {{- if index .Values "auth-server" "ingress" "uma2ConfigEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/uma2-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/restv1/uma2-configuration
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 5. Webfinger */}}
  {{- if index .Values "auth-server" "ingress" "webfingerEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/webfinger
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/.well-known/webfinger
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 6. Simple Web Discovery */}}
  {{- if index .Values "auth-server" "ingress" "webdiscoveryEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/simple-web-discovery
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/.well-known/simple-web-discovery
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 7. FIDO Configuration (U2F) */}}
  {{- if index .Values "auth-server" "ingress" "u2fConfigEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/fido-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/restv1/fido-configuration
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 8. FIDO2 Configuration */}}
  {{- if .Values.fido2.ingress.fido2ConfigEnabled }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/fido2-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-fido2/restv1/configuration
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 9. WebAuthn */}}
  {{- if .Values.fido2.ingress.fido2WebauthnEnabled }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/webauthn
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-fido2/restv1/webauthn/configuration
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 10. SCIM Configuration */}}
  {{- if .Values.scim.ingress.scimConfigEnabled }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/scim-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-scim/restv1/scim-configuration
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 11. Lock Config */}}
  {{- if and (index .Values "auth-server" "lockEnabled") (index .Values "auth-server" "ingress" "lockConfigEnabled") }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/lock-server-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/api/v1/configuration
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 12. Authzen Config */}}
  {{- if index .Values "auth-server" "ingress" "authzenConfigEnabled" }}
  - matches:
    - path:
        type: Exact
        value: /.well-known/authzen-configuration
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /jans-auth/restv1/authzen-configuration
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

---
{{- /* ======================================================== */}}
{{- /* ROUTE 2: SECURE APPS (HTTPS TRAFFIC)                     */}}
{{- /* These endpoints serve the app when reached on HTTPS      */}}
{{- /* ======================================================== */}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-routes-secure
  namespace: {{ $namespace }}
  labels:
    app: {{ $fullName }}-routes
{{- if index .Values "gateway-api" "routes" "labels" }}
{{- toYaml (index .Values "gateway-api" "routes" "labels") | nindent 4 }}
{{- end }}
{{- if index .Values "gateway-api" "routes" "annotations" }}
  annotations:
{{- toYaml (index .Values "gateway-api" "routes" "annotations") | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: {{ index .Values "gateway-api" "gateway" "name" }}
    sectionName: https  # ONLY LISTEN ON HTTPS
  hostnames:
  - {{ .Values.fqdn | quote }}
  rules:

  {{- /* 1. Auth Server (/jans-auth) */}}
  {{- if index .Values "auth-server" "ingress" "authServerEnabled" }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-auth
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 2. Casa (/jans-casa) */}}
  {{- if .Values.casa.ingress.casaEnabled }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-casa
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 3. Config API (/jans-config-api) */}}
  {{- if index .Values "config-api" "ingress" "configApiEnabled" }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-config-api
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 4. FIDO2 (/jans-fido2) */}}
  {{- if .Values.fido2.ingress.fido2Enabled }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-fido2
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

  {{- /* 5. SCIM (/jans-scim) */}}
  {{- if .Values.scim.ingress.scimEnabled }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-scim
    backendRefs:
    - name: {{ $svcName }}
      port: {{ $svcPort }}
  {{- end }}

---
{{- /* ======================================================== */}}
{{- /* ROUTE 3: SECURE APPS (HTTP REDIRECT)                     */}}
{{- /* These endpoints REDIRECT to HTTPS when reached on HTTP   */}}
{{- /* ======================================================== */}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-routes-redirect
  namespace: {{ $namespace }}
  labels:
    app: {{ $fullName }}-routes
{{- if index .Values "gateway-api" "routes" "labels" }}
{{- toYaml (index .Values "gateway-api" "routes" "labels") | nindent 4 }}
{{- end }}
{{- if index .Values "gateway-api" "routes" "annotations" }}
  annotations:
{{- toYaml (index .Values "gateway-api" "routes" "annotations") | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: {{ index .Values "gateway-api" "gateway" "name" }}
    sectionName: http  # ONLY LISTEN ON HTTP
  hostnames:
  - {{ .Values.fqdn | quote }}
  rules:

  {{- /* Same 6 Rules, but with Redirect Filter instead of BackendRef */}}

  {{- /* 1. Auth Server Redirect */}}
  {{- if index .Values "auth-server" "ingress" "authServerEnabled" }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-auth
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
  {{- end }}

  {{- /* 2. Casa Redirect */}}
  {{- if .Values.casa.ingress.casaEnabled }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-casa
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
  {{- end }}

  {{- /* 3. Config API Redirect */}}
  {{- if index .Values "config-api" "ingress" "configApiEnabled" }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-config-api
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
  {{- end }}

  {{- /* 4. FIDO2 Redirect */}}
  {{- if .Values.fido2.ingress.fido2Enabled }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-fido2
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
  {{- end }}

  {{- /* 5. SCIM Redirect */}}
  {{- if .Values.scim.ingress.scimEnabled }}
  - matches:
    - path:
        type: PathPrefix
        value: /jans-scim
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
  {{- end }}

{{- if and (index .Values "auth-server" "lockEnabled") (index .Values "auth-server" "ingress" "lockAuditEnabled") }}
---
{{- /* ======================================================== */}}
{{- /* ROUTE 4: gRPC APPS                                       */}}
{{- /* These endpoints use gRPC                                 */}}
{{- /* ======================================================== */}}
apiVersion: gateway.networking.k8s.io/v1
{{- if ne (index .Values "gateway-api" "gateway" "className") "nginx" }}
kind: HTTPRoute
{{- else }}
kind: GRPCRoute
{{- end }}
metadata:
  name: {{ $fullName }}-grpc-routes
  namespace: {{ $namespace }}
  labels:
    app: {{ $fullName }}-routes
{{- if index .Values "gateway-api" "routes" "labels" }}
{{- toYaml (index .Values "gateway-api" "routes" "labels") | nindent 4 }}
{{- end }}
{{- if index .Values "gateway-api" "routes" "annotations" }}
  annotations:
{{- toYaml (index .Values "gateway-api" "routes" "annotations") | nindent 4 }}
{{- end }}
spec:
  parentRefs:
  - name: {{ index .Values "gateway-api" "gateway" "name" }}
    sectionName: https
  hostnames:
  - {{ .Values.fqdn | quote }}
  rules:
  {{- /* 1. Lock Server Audit */}}
  {{- /* DONT use URL rewrite to forward `/io.jans.lock.audit.AuditService` to `/jans-auth/io.jans.lock.audit.AuditService` as AIO image handles it internally */}}
  {{- if ne (index .Values "gateway-api" "gateway" "className") "nginx" }}
  - matches:
    - path:
        type: PathPrefix
        value: /io.jans.lock.audit.AuditService
    backendRefs:
    - name: {{ $svcName }}-grpc
      port: 50051
  {{- else }}
  - matches:
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessLog
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessBulkLog
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessHealth
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessBulkHealth
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessTelemetry
    - method:
        service: io.jans.lock.audit.AuditService
        method: ProcessBulkTelemetry
    backendRefs:
    - name: {{ $svcName }}-grpc
      port: 50051
  {{- end }}
{{- end }}

{{- end }}
