language="C"
header="/* Cedarling C Bindings - Auto generated header file*/"
include_version = true
include_guard = "CEDARLING_C_H"
namespace = "Cedarling"
cpp_compat = true
style = "both"

[export]
include=["CedarlingErrorCode","CedarlingStringArray","CedarlingResult","CedarlingInstanceResult"]
exclude=[]

[fn]
postfix = ""
args="horizontal"
rename_args="SnakeCase"


[struct]
rename_fields = "SnakeCase"
must_use="CedarlingResult"

[enum]
rename_variants = "ScreamingSnakeCase"
must_use = "CedarlingErrorCode"


[defines]
"target_os=windows" = "CEDARLING_WINDOWS"
"target_os=linux" = "CEDARLING_LINUX"
"target_os=macos" = "CEDARLING_MACOS"