[package]
name = "cedarling_wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"] # Required for WASM output

[dependencies]
wasm-bindgen = "0.2"             # Common dependency for WASM interop
cedarling = { workspace = true }
serde-wasm-bindgen = "0.6"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1.7"

[profile.release]
lto = true
