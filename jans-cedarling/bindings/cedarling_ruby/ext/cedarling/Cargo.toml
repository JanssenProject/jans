[package]
name = "cedarling_ruby"
version = "0.1.0"
edition = "2021"
authors = ["John Anderson <john@gluu.org>"]
license = "MIT"
publish = false

[lib]
name="cedarling_ruby"
crate-type = ["cdylib"]

[dependencies]
magnus = { version = "0.6.2" }
serde_magnus = "0.8.1"
cedarling = { path = "../../../../cedarling" }
uuid7 = { version = "1.1.0", features = ["serde", "uuid"] }
