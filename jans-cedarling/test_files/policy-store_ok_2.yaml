# This policy store is used for testing authorize_unsigned with TestPrincipal entities.
# Legacy User/Workload policies have been removed as they are no longer used.
cedar_version: v4.0.0
policy_stores:
  a1bf93115de86de760ee0bea1d529b521489e5a11747:
    cedar_version: v4.0.0
    name: "Jans"
    trusted_issuers:
      Jans123123:
        name: "Jans"
        description: "A Test IDP"
        openid_configuration_endpoint: "https://account.gluu.org/.well-known/openid-configuration"
        token_metadata:
          access_token:
            entity_type_name: "Jans::Access_token"
          id_token:
            entity_type_name: "Jans::Id_token"
          userinfo_token:
            entity_type_name: "Jans::Userinfo_token"
    policies:
      5:
        description: simple policy for principal TestPrincipal-s used by authorize_unsigned tests
        creation_date: "2025-03-18T17:22:39.996050"
        policy_content:
          encoding: none
          content_type: cedar
          body: |-
            permit(
                principal,
                action in [Jans::Action::"UpdateForTestPrincipals"],
                resource
            )when{
              principal.is_ok
            };
    schema:
      encoding: none
      content_type: cedar
      body: |-
        namespace Jans {
        type Url = {"host": String, "path": String, "protocol": String};
        entity TrustedIssuer = {"issuer_entity_id": Url};
        entity Issue = {"country": String, "org_id": String};
        entity Access_token = { iss: TrustedIssuer };
        entity Id_token = { iss: TrustedIssuer };
        entity Userinfo_token = { iss: TrustedIssuer };
        entity TestPrincipal1  = {"is_ok": Bool};
        entity TestPrincipal2  = {"is_ok": Bool};
        entity TestPrincipal3  = {"is_ok": Bool};
        action "UpdateForTestPrincipals" appliesTo {
          principal: [TestPrincipal1, TestPrincipal2, TestPrincipal3],
          resource: [Issue],
          context: {}
        };
        }
