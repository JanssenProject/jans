cedar_version: v4.0.0
policy_stores:
  multi_issuer_no_schema_store:
    cedar_version: v4.0.0
    name: MultiIssuerNoSchema
    description: No-schema policy store for testing multi-issuer authorization
    trusted_issuers:
      AcmeIssuer:
        name: "Acme"
        description: "Acme Corporation Identity Provider"
        openid_configuration_endpoint: "https://idp.acme.com/.well-known/openid-configuration"
        token_metadata:
          access_token:
            entity_type_name: "Acme::Access_Token"
      DolphinIssuer:
        name: "Dolphin"
        description: "Dolphin Sea Identity Provider"
        openid_configuration_endpoint: "https://idp.dolphin.sea/.well-known/openid-configuration"
        token_metadata:
          access_token:
            entity_type_name: "Dolphin::Access_Token"
          dolphin_token:
            entity_type_name: "Dolphin::Dolphin_Token"
    policies:
      allow_dolphin_token:
        description: Allow if a dolphin access token is present in context
        creation_date: "2024-12-19T10:00:00.000000"
        policy_content:
          encoding: none
          content_type: cedar
          body: |-
            permit(
                principal,
                action == Acme::Action::"GetFood",
                resource
            ) when {
                context has tokens &&
                context.tokens has dolphin_access_token
            };
    default_entities:
      "1694c954f8a3": "ewogICAgInVpZCI6IHsKICAgICAgICAidHlwZSI6ICJBY21lOjpSZXNvdXJjZSIsCiAgICAgICAgImlkIjogIjE2OTRjOTU0ZjhhMyIKICAgIH0sCiAgICAiYXR0cnMiOiB7CiAgICAgICAgIm5hbWUiOiAiQXBwcm92ZWQgRG9scGhpbiBGb29kcyIKICAgIH0KfQ=="
