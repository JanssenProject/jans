[target.wasm32-unknown-unknown]
runner = 'wasm-bindgen-test-runner'
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]

# CFLAGS/CXXFLAGS below use the `cc` crate's target-suffixed variable naming
# convention (e.g. `CFLAGS_aarch64_apple_ios`), which the `cc` crate looks up
# *before* falling back to the plain `CFLAGS`/`CXXFLAGS` names. This means
# these values only apply when actually compiling for that specific target
# triple, even though the `[env]` table itself is global (Cargo has no
# `[target.<triple>.env]` section — that is not valid config syntax).
[env]
CFLAGS_aarch64_apple_ios = "-miphoneos-version-min=17.5"
CXXFLAGS_aarch64_apple_ios = "-miphoneos-version-min=17.5"
CFLAGS_aarch64_apple_ios_sim = "-mios-simulator-version-min=17.5"
CXXFLAGS_aarch64_apple_ios_sim = "-mios-simulator-version-min=17.5"

# Configuration specifically for 64-bit ARM iOS devices
[target.aarch64-apple-ios]
# This handles your RUSTFLAGS
rustflags = ["-C", "link-arg=-miphoneos-version-min=17.5"]

# Configuration for the iOS Simulator (Apple Silicon Macs)
[target.aarch64-apple-ios-sim]
rustflags = ["-C", "link-arg=-mios-simulator-version-min=17.5"]
