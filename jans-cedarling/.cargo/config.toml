[target.wasm32-unknown-unknown]
runner = 'wasm-bindgen-test-runner'
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]

# This handles your CFLAGS, CXXFLAGS, and DEPLOYMENT_TARGET
# NOTE: these must stay scoped to the iOS targets below (not a global [env]
# section) — a global IPHONEOS_DEPLOYMENT_TARGET leaks into native macOS
# builds and causes clang to target iPhone while SDKROOT points at the
# macOS SDK, which breaks aws-lc-sys's compiler self-test on macOS runners.
[target.aarch64-apple-ios.env]
IOS_MIN = "17.5"
IPHONEOS_DEPLOYMENT_TARGET = "17.5"
CFLAGS = "-miphoneos-version-min=17.5"
CXXFLAGS = "-miphoneos-version-min=17.5"

[target.aarch64-apple-ios-sim.env]
IOS_MIN = "17.5"
IPHONEOS_DEPLOYMENT_TARGET = "17.5"
CFLAGS = "-mios-simulator-version-min=17.5"
CXXFLAGS = "-mios-simulator-version-min=17.5"

# Configuration specifically for 64-bit ARM iOS devices
[target.aarch64-apple-ios]
# This handles your RUSTFLAGS
rustflags = ["-C", "link-arg=-miphoneos-version-min=17.5"]

# Configuration for the iOS Simulator (Apple Silicon Macs)
[target.aarch64-apple-ios-sim]
rustflags = ["-C", "link-arg=-mios-simulator-version-min=17.5"]
