# github-actions-example.yml — GitHub Actions workflow using JWT-based Terraform
# authorization with Cedarling-OPA.
#
# This workflow shows how to wire the GitHub Actions OIDC token into the
# tf_authz_jwt.sh wrapper so that Cedar policies evaluate the pipeline's
# identity (repository, branch, GitHub Environment) before Terraform runs.
#
# WORKING DIRECTORY NOTE:
#   All relative paths below (e.g. `./demo/terraform-jwt/tf_authz_jwt.sh`) assume
#   the job's working directory is `jans-cedarling/cedarling_opa/` — the root of
#   the cedarling_opa module. If you copy this file into a repository where the
#   working directory is the repo root, adjust the paths accordingly.
#   Alternatively, add a `defaults: run: working-directory: jans-cedarling/cedarling_opa`
#   block at the workflow level.
#
# OPA SERVER OPTIONS — choose one approach:
#
#   Option A — Remote/shared server (default):
#     Set the OPA_URL variable (or repository/environment secret) to point at a
#     persistent opa-cedarling deployment. The jobs below use this approach.
#
#   Option B — Self-hosted OPA spun up inside the CI job (production mode):
#     Each job can start its own OPA instance in the background using Docker
#     Compose. This requires Docker to be available on the runner (ubuntu-latest
#     includes it). Add the step shown below in each job BEFORE the Terraform
#     steps and set OPA_URL to http://localhost:8181.
#
#     Uncomment the "Start OPA (self-hosted, production mode)" step in each job
#     to enable this path. The step uses docker-compose.prod.yml to enable real
#     JWT signature validation — locally crafted tokens will be rejected.
#
# Prerequisites:
#   1. An opa-cedarling server reachable from the runner (self-hosted or via a
#      sidecar/service container). Point OPA_URL at it.
#   2. The terraform-jwt demo policy store loaded into the server.
#   3. `permissions: id-token: write` on the job — this grants the runner the
#      right to request a GitHub OIDC token. GitHub injects
#      ACTIONS_ID_TOKEN_REQUEST_URL and ACTIONS_ID_TOKEN_REQUEST_TOKEN
#      automatically once this permission is set.

name: Terraform CI (JWT-authorized)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: jans-cedarling/cedarling_opa

jobs:
  # ── Plan (allowed on any branch from the trusted repo) ────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required to request the GitHub OIDC token
      contents: read

    env:
      TF_WORKSPACE: ${{ vars.TF_WORKSPACE || 'staging' }}
      OPA_URL:      ${{ vars.OPA_URL || 'http://opa-service:8181' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # ── Self-hosted OPA (Option B) ──────────────────────────────────────────
      # Uncomment this step (and set OPA_URL to http://localhost:8181 in the env
      # block above) to spin up the OPA server inside this CI job in production
      # mode. JWT signature validation will be ON — only real GitHub OIDC tokens
      # issued for this runner are accepted. The step waits until the /health
      # endpoint returns HTTP 200 before continuing.
      #
      # Requires: Docker available on the runner (ubuntu-latest includes it).
      #           Outbound HTTPS to https://token.actions.githubusercontent.com
      #           must be reachable so OPA can fetch GitHub's JWKS at startup.
      #
      # - name: Start OPA (self-hosted, production mode)
      #   working-directory: demo/terraform-jwt
      #   run: |
      #     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
      #     echo "Waiting for OPA to become healthy..."
      #     healthy=false
      #     for i in $(seq 1 30); do
      #       if curl -sf http://localhost:8181/health > /dev/null 2>&1; then
      #         echo "OPA is healthy"; healthy=true; break
      #       fi
      #       sleep 2
      #     done
      #     $healthy || { echo "ERROR: OPA did not become healthy in time"; exit 1; }
      # ───────────────────────────────────────────────────────────────────────

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Fetch GitHub OIDC token
        id: get-token
        run: |
          TOKEN=$(./demo/terraform-jwt/tf_authz_jwt.sh --fetch-token)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        run: terraform -chdir=demo/terraform-jwt init

      - name: Terraform plan (authorized via JWT)
        env:
          TF_JWT: ${{ steps.get-token.outputs.token }}
        run: ./demo/terraform-jwt/tf_authz_jwt.sh -chdir=demo/terraform-jwt plan

      # ── Self-hosted OPA teardown (Option B) ─────────────────────────────────
      # Uncomment this step when using the self-hosted OPA option above.
      # `if: always()` ensures the containers are stopped even if an earlier
      # step fails. On ephemeral ubuntu-latest runners this is optional, but on
      # persistent self-hosted runners it prevents orphaned containers from
      # accumulating across jobs.
      #
      # - name: Stop OPA (self-hosted, production mode)
      #   if: always()
      #   working-directory: demo/terraform-jwt
      #   run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down
      # ───────────────────────────────────────────────────────────────────────

  # ── Apply to staging (allowed from main branch) ───────────────────────────
  terraform-apply-staging:
    name: Terraform Apply — staging
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    env:
      TF_WORKSPACE: staging
      OPA_URL:      ${{ vars.OPA_URL || 'http://opa-service:8181' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # ── Self-hosted OPA (Option B) — see plan job for full description ──────
      # - name: Start OPA (self-hosted, production mode)
      #   working-directory: demo/terraform-jwt
      #   run: |
      #     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
      #     echo "Waiting for OPA to become healthy..."
      #     healthy=false
      #     for i in $(seq 1 30); do
      #       if curl -sf http://localhost:8181/health > /dev/null 2>&1; then
      #         echo "OPA is healthy"; healthy=true; break
      #       fi
      #       sleep 2
      #     done
      #     $healthy || { echo "ERROR: OPA did not become healthy in time"; exit 1; }
      # ───────────────────────────────────────────────────────────────────────

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Fetch GitHub OIDC token
        id: get-token
        run: |
          TOKEN=$(./demo/terraform-jwt/tf_authz_jwt.sh --fetch-token)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        run: terraform -chdir=demo/terraform-jwt init

      - name: Terraform apply — staging (authorized via JWT)
        env:
          TF_JWT: ${{ steps.get-token.outputs.token }}
        run: ./demo/terraform-jwt/tf_authz_jwt.sh -chdir=demo/terraform-jwt apply -auto-approve

      # ── Self-hosted OPA teardown (Option B) ─────────────────────────────────
      # Uncomment this step when using the self-hosted OPA option above.
      # `if: always()` ensures the containers are stopped even if an earlier
      # step fails. On ephemeral ubuntu-latest runners this is optional, but on
      # persistent self-hosted runners it prevents orphaned containers from
      # accumulating across jobs.
      #
      # - name: Stop OPA (self-hosted, production mode)
      #   if: always()
      #   working-directory: demo/terraform-jwt
      #   run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down
      # ───────────────────────────────────────────────────────────────────────

  # ── Apply to production (requires GitHub Environment approval) ────────────
  terraform-apply-production:
    name: Terraform Apply — production
    runs-on: ubuntu-latest
    needs: terraform-apply-staging
    if: github.ref == 'refs/heads/main'
    # The "production" environment requires manual approval from designated
    # reviewers (configured in GitHub Settings → Environments → production).
    # GitHub injects environment: "production" into the OIDC token only after
    # the approval gate passes. The Cedar policy ci-permit-apply-prod-via-environment
    # checks for this claim, so the cryptographic proof of human approval is
    # embedded in the JWT that Cedarling validates.
    environment: production
    permissions:
      id-token: write
      contents: read

    env:
      TF_WORKSPACE: production
      OPA_URL:      ${{ vars.OPA_URL || 'http://opa-service:8181' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # ── Self-hosted OPA (Option B) — see plan job for full description ──────
      # - name: Start OPA (self-hosted, production mode)
      #   working-directory: demo/terraform-jwt
      #   run: |
      #     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
      #     echo "Waiting for OPA to become healthy..."
      #     healthy=false
      #     for i in $(seq 1 30); do
      #       if curl -sf http://localhost:8181/health > /dev/null 2>&1; then
      #         echo "OPA is healthy"; healthy=true; break
      #       fi
      #       sleep 2
      #     done
      #     $healthy || { echo "ERROR: OPA did not become healthy in time"; exit 1; }
      # ───────────────────────────────────────────────────────────────────────

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Fetch GitHub OIDC token
        id: get-token
        run: |
          TOKEN=$(./demo/terraform-jwt/tf_authz_jwt.sh --fetch-token)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        run: terraform -chdir=demo/terraform-jwt init

      - name: Terraform apply — production (authorized via JWT + Environment approval)
        env:
          TF_JWT: ${{ steps.get-token.outputs.token }}
        run: ./demo/terraform-jwt/tf_authz_jwt.sh -chdir=demo/terraform-jwt apply -auto-approve

      # ── Self-hosted OPA teardown (Option B) ─────────────────────────────────
      # Uncomment this step when using the self-hosted OPA option above.
      # `if: always()` ensures the containers are stopped even if an earlier
      # step fails. On ephemeral ubuntu-latest runners this is optional, but on
      # persistent self-hosted runners it prevents orphaned containers from
      # accumulating across jobs.
      #
      # - name: Stop OPA (self-hosted, production mode)
      #   if: always()
      #   working-directory: demo/terraform-jwt
      #   run: docker compose -f docker-compose.yml -f docker-compose.prod.yml down
      # ───────────────────────────────────────────────────────────────────────
