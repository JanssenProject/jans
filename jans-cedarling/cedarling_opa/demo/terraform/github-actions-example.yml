# github-actions-example.yml — GitHub Actions workflow using unsigned Terraform
# authorization with Cedarling-OPA.
#
# This workflow shows how to wire environment-variable-based identity into the
# tf_authz.sh wrapper so that Cedar policies evaluate TF_USER_ID and
# TF_USER_ROLES before Terraform runs.
#
# WORKING DIRECTORY NOTE:
#   All relative paths below (e.g. `./demo/terraform/tf_authz.sh`) assume
#   the job's working directory is `jans-cedarling/cedarling_opa/` — the root of
#   the cedarling_opa module. If you copy this file into a repository where the
#   working directory is the repo root, adjust the paths accordingly.
#   Alternatively, add a `defaults: run: working-directory: jans-cedarling/cedarling_opa`
#   block at the workflow level.
#
# Prerequisites:
#   1. An opa-cedarling server reachable from the runner (self-hosted or via a
#      sidecar/service container). Point OPA_URL at it.
#   2. The terraform demo policy store loaded into the server.
#   3. Repository variables TF_USER_ID and TF_USER_ROLES set in
#      GitHub Settings → Secrets and variables → Actions → Variables.
#      TF_USER_ROLES must match a Cedar role defined in the policy store
#      (e.g. "Developer", "Ops", or "Admin").

name: Terraform CI (role-authorized)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Plan (allowed for any branch, any role that has Plan permission) ────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      TF_WORKSPACE:  ${{ vars.TF_WORKSPACE || 'staging' }}
      TF_USER_ID:    ${{ vars.TF_USER_ID }}
      TF_USER_ROLES: ${{ vars.TF_USER_ROLES }}
      OPA_URL:       ${{ vars.OPA_URL || 'http://opa-service:8181' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=demo/terraform init

      - name: Terraform plan (authorized via Cedar role)
        run: ./demo/terraform/tf_authz.sh -chdir=demo/terraform plan

  # ── Apply to staging (allowed from main for Ops/Admin roles) ────────────────
  terraform-apply-staging:
    name: Terraform Apply — staging
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    env:
      TF_WORKSPACE:  staging
      TF_USER_ID:    ${{ vars.TF_USER_ID }}
      TF_USER_ROLES: ${{ vars.TF_USER_ROLES }}
      OPA_URL:       ${{ vars.OPA_URL || 'http://opa-service:8181' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=demo/terraform init

      - name: Terraform apply — staging (authorized via Cedar role)
        run: ./demo/terraform/tf_authz.sh -chdir=demo/terraform apply -auto-approve

  # ── Apply to production (requires GitHub Environment approval + Admin role) ──
  terraform-apply-production:
    name: Terraform Apply — production
    runs-on: ubuntu-latest
    needs: terraform-apply-staging
    if: github.ref == 'refs/heads/main'
    # The "production" environment requires manual approval from designated
    # reviewers (configured in GitHub Settings → Environments → production).
    # Combined with TF_USER_ROLES=Admin, only approved admins can reach this
    # step — the Cedar policy admin-permit-all enforces the role check, and
    # the GitHub Environment gate enforces the human-approval requirement.
    environment: production
    permissions:
      contents: read

    env:
      TF_WORKSPACE:  production
      TF_USER_ID:    ${{ vars.TF_USER_ID }}
      TF_USER_ROLES: ${{ vars.TF_USER_ROLES }}
      OPA_URL:       ${{ vars.OPA_URL || 'http://opa-service:8181' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=demo/terraform init

      - name: Terraform apply — production (authorized via Cedar role + Environment approval)
        run: ./demo/terraform/tf_authz.sh -chdir=demo/terraform apply -auto-approve
